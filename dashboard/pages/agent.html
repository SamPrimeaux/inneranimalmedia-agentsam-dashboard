.agent-sam-preview-drawer .preview-drawer-body {
  flex: 1 1 0%;
  min-height: 0;
  overflow: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.agent-sam-preview-drawer .preview-drawer-body iframe {
  flex: 1 1 0%;
  width: 100%;
  height: 100%;
  min-height: 60vh;
  border: none;
  display: block;
}
.agent-sam-preview-drawer .preview-drawer-body pre {
  margin: 0;
  padding: 16px;
  font-size: 13px;

.agent-sam-file-card .file-card-actions button:hover { background: var(--bg-canvas); }
.agent-sam-file-card .file-card-actions button.view-btn { background: var(--accent, #3b82f6); color: #fff; border-color: var(--accent); }
.agent-sam-code-panel {
  flex: 1 1 0%;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.agent-sam-code-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border, #e5e7eb);

  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-canvas);
  color: var(--text-primary);
  font-size: 13px;
}
.agent-sam-code-toolbar button {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-elevated);
  color: var(--text-primary);

}

}
.agent-sam-code-toolbar button.agent-sam-run { background: var(--accent, #3b82f6); color: #fff; border-color: var(--accent); }
.agent-sam-code-toolbar button.agent-sam-deploy { background: var(--success, #059669); color: #fff; border-color: var(--success); }
#agentSamMonacoContainer { flex: 1 1 0%; min-height: 200px; width: 100%; }
.agent-sam-preview-panel {
  flex: 1 1 0%;
  min-height: 0;
  overflow: hidden;
  padding: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg-elevated);
}
.agent-sam-preview-panel .preview-body {
  flex: 1 1 0%;
  min-height: 0;
  width: 100%;
  padding: 16px;
  overflow: auto;
  white-space: pre-wrap;

}
.agent-sam-preview-panel iframe.preview-iframe {
  flex: 1 1 0%;
  width: 100%;
  min-height: 0;
  border: none;
  background: #fff;
}
.agent-sam-bubble .apply-to-code-btn {
  margin-top: 10px;
  padding: 6px 12px;
  font-size: 12px;
  background: var(--accent, #3b82f6);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.agent-sam-bubble .apply-to-code-btn:hover { opacity: 0.9; }
.agent-sam-code-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.agent-sam-apply { padding: 6px 12px; font-size: 12px; background: var(--success, #10b981); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
.agent-sam-apply:hover { opacity: 0.9; }
.agent-sam-apply:disabled { opacity: 0.6; cursor: not-allowed; }
.agent-sam-stage { padding: 6px 12px; font-size: 12px; background: var(--bg-canvas); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
.agent-sam-stage:hover { background: var(--border); }
.agent-sam-preview-toolbar, .agent-sam-logs-toolbar { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.agent-sam-preview-toolbar button, .agent-sam-logs-toolbar button { padding: 6px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-elevated); cursor: pointer; }
.agent-sam-preview-hint { font-size: 12px; color: var(--text-secondary); }
.agent-sam-logs-table-wrap { flex: 1; min-height: 0; overflow: auto; }
.agent-sam-logs-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.agent-sam-msg-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.agent-sam-msg-actions button { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-elevated); cursor: pointer; }
.agent-sam-msg-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
@media (max-width: 640px) {
  .agent-sam-tabs { padding: 12px 16px; }
  .agent-sam-messages { padding: 16px 12px; }
  .agent-sam-input-wrap { padding: 12px 16px; }
}
@media (max-width: 768px) {
  .agent-sam-resizer { display: none; }
  .agent-sam-workstation {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 100%;
    max-height: 70vh;
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);

    transform: translateY(100%);
    transition: transform 0.25s ease;
  }
  .agent-sam-workstation.slide-up { transform: translateY(0); }
  .agent-sam-workstation.collapsed { display: none; }
}

<script>
(function () {
  var main = document.querySelector('main.main-content');
  if (main) {
    main.classList.add('agent-page-main');
    main.style.overflow = 'hidden';
    main.style.display = 'flex';
    main.style.flexDirection = 'column';
    main.style.minHeight = '0';
    main.style.height = '100%';
  }
  var root = document.querySelector('.agent-sam-root');
  if (root) {
    root.style.flex = '1 1 0';
    root.style.minHeight = '0';
    root.style.overflow = 'hidden';
  }
  var messagesWrap = document.getElementById('agentSamMessages');
  if (messagesWrap) {
    messagesWrap.style.flex = '1 1 0';
    messagesWrap.style.minHeight = '0';
    messagesWrap.style.overflowY = 'auto';
  }
  const base = window.location.origin;
  const fetcher = window.dashboardFetch || fetch;
  const providers = [
    { id: 'anthropic', name: 'Claude', letter: 'C' },
    { id: 'openai', name: 'GPT', letter: 'G' },
    { id: 'gemini', name: 'Gemini', letter: 'G' },
    { id: 'workers_ai', name: 'Workers AI', letter: 'W' },
    { id: 'cursor', name: 'Cursor', letter: 'X' }
  ];
  let activeProvider = 'anthropic';
  let mode = 'chat';
  const messages = [];
  let currentConversationId = null;
  let pendingAttachUrl = null;
  let pendingAttachName = null;
  let agentBusy = false;
  let abortController = null;

  const messagesEl = document.getElementById('agentSamMessages');
  const emptyEl = document.getElementById('agentSamEmpty');
  const emptyHint = document.getElementById('agentSamEmptyHint');
  const inputEl = document.getElementById('agentSamInput');
  const sendBtn = document.getElementById('agentSamSend');
  const sendIconArrow = document.getElementById('agentSamSendIconArrow');
  const sendIconStop = document.getElementById('agentSamSendIconStop');
  const fileInput = document.getElementById('agentSamFile');
  const uploadBtn = document.getElementById('agentSamUploadBtn');
  const attachedContainer = document.getElementById('agentSamAttached');
  const footerProvider = document.getElementById('agentSamFooterProvider');
  const codeEl = document.getElementById('agentSamCode');
  const previewEl = document.getElementById('agentSamPreview');
  const previewIframe = document.getElementById('agentSamPreviewIframe');
  const langSelect = document.getElementById('agentSamLang');
  const runBtn = document.getElementById('agentSamRunBtn');
  const deployBtn = document.getElementById('agentSamDeployBtn');

  function getCodeValue() {
    if (window.monacoEditorInstance) return window.monacoEditorInstance.getValue();
    return (codeEl && codeEl.value) || '';
  }
  function setCodeValue(val) {
    if (window.monacoEditorInstance) {
      window.monacoEditorInstance.setValue(val || '');
    } else if (codeEl) {
      codeEl.value = val || '';
    }
  }
  function getCodeLanguage() {
    return (langSelect && langSelect.value) || 'javascript';
  }
  function initMonaco() {
    var container = document.getElementById('agentSamMonacoContainer');
    if (!container || window.monacoEditorInstance) return;
    var lang = getCodeLanguage();
    var initial = (codeEl && codeEl.value) || '// Write or paste code here\n';
    window.monacoEditorInstance = monaco.editor.create(container, {
      value: initial,
      language: lang,
      theme: 'vs-dark',
      automaticLayout: true,
      minimap: { enabled: true },
      fontSize: 14
    });
    if (codeEl) codeEl.style.display = 'none';
    window.monacoEditorInstance.getModel().onDidChangeContent(function() {
      if (codeEl) codeEl.value = window.monacoEditorInstance.getValue();
    });
    if (langSelect) langSelect.addEventListener('change', function() {
      monaco.editor.setModelLanguage(window.monacoEditorInstance.getModel(), this.value);
    });
  }
  function ensureMonaco(cb) {
    if (window.monacoEditorInstance) { if (cb) cb(); return; }
    if (window.monacoEditorReady) { if (cb) cb(); return; }
    if (!window.monacoLoaderLoaded) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js';
      s.onload = function() {
        window.monacoLoaderLoaded = true;
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }, 'vs/nls': { availableLanguages: {} } });
        require(['vs/editor/editor.main'], function() {
          window.monacoEditorReady = true;
          initMonaco();
          if (cb) cb();
        });
      };
      s.onerror = function() { if (cb) cb(); };
      document.head.appendChild(s);
    } else {
      require(['vs/editor/editor.main'], function() {
        if (!window.monacoEditorInstance) initMonaco();
        if (cb) cb();
      });
    }
  }
  const providerBtn = document.getElementById('agentSamProviderBtn');
  const providerDropdown = document.getElementById('agentSamProviderDropdown');
  const atBtn = document.getElementById('agentSamAtBtn');

  function getProvider() {
    return providers.find(function (p) { return p.id === activeProvider; }) || providers[0];
  }

  function setProvider(p) {
    activeProvider = p;
    if (footerProvider) footerProvider.textContent = getProvider().name + ' • Extended';
    if (emptyEl && emptyEl.style.display !== 'none') {
      emptyHint.textContent = getProvider().name + ' ready • ' + mode + ' mode';
    }
    providerDropdown.querySelectorAll('button').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-provider') === p);
    });
  }

  if (providerBtn && providerDropdown) {
    // Load real AI models from database first
    fetcher(base + '/api/agent/models', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.models && d.models.length) {
          providerDropdown.innerHTML = d.models.map(function(m) {
            var label = m.name;
            if (m.cost) label += ' (' + m.cost + ')';
            return '<button type="button" role="menuitem" data-provider="' + 
              m.id + '" data-model-name="' + m.name + '" title="' + (m.description || '') + '">' + 
              label + '</button>';
          }).join('');
        }
        
        // After models loaded, attach all handlers
        providerDropdown.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () {
            var p = this.getAttribute('data-provider');
            var name = this.getAttribute('data-model-name') || this.textContent.trim();
            if (p) {
              activeProvider = p;
              if (footerProvider) footerProvider.textContent = name + ' • Extended';
              if (emptyEl && emptyEl.style.display !== 'none') {
                emptyHint.textContent = name + ' ready • ' + mode + ' mode';
              }
            }
            providerDropdown.hidden = true;
            providerBtn.setAttribute('aria-expanded', 'false');
          });
        });
      })
      .catch(function(e) { 
        console.warn('Could not load models:', e);
        // If API fails, still attach handlers to hardcoded buttons
        providerDropdown.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () {
            var p = this.getAttribute('data-provider');
            if (p) setProvider(p);
            providerDropdown.hidden = true;
            providerBtn.setAttribute('aria-expanded', 'false');
          });
        });
      });
    
    // Toggle dropdown
    providerBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      const open = providerDropdown.hidden;
      providerDropdown.hidden = !open;
      providerBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    
    // Close on outside click
    document.addEventListener('click', function (e) {
      if (providerDropdown && !providerDropdown.hidden && !providerDropdown.contains(e.target) && !providerBtn.contains(e.target)) {
        providerDropdown.hidden = true;
        providerBtn.setAttribute('aria-expanded', 'false');
      }
    });
  }

  var atPopover = document.getElementById('agentSamAtPopover');
  var atListEl = document.getElementById('agentSamAtList');

        return { body: body, lang: lang || 'plaintext' };

  }
  document.addEventListener('paste', function (e) {
    if (!e.clipboardData || !e.clipboardData.files || !e.clipboardData.files.length) return;
    var file = e.clipboardData.files[0];
    if (file && /^image\//.test(file.type)) {
      e.preventDefault();
      doUploadFile(file);
    }
  });

  function renderMessagesOnly() {
    var wrap = document.getElementById('agentSamMessages');
    var emptyNode = document.getElementById('agentSamEmpty');
    if (!wrap) return;
    var existing = wrap.querySelectorAll('.agent-sam-msg');
    existing.forEach(function (n) { n.remove(); });
    if (emptyNode) emptyNode.style.display = messages.length ? 'none' : '';
    messages.forEach(function (m) {
      if (m.role === 'system') return;
      var div = document.createElement('div');
      div.className = 'agent-sam-msg';
      var avatar = document.createElement('div');
      avatar.className = 'agent-sam-avatar';
      if (m.role === 'user') {
        avatar.style.background = 'var(--accent)';
        avatar.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
        avatar.style.color = 'var(--text-nav, #fff)';
      } else {
        var p = m.provider ? providers.find(function (x) { return x.id === m.provider; }) : null;
        avatar.style.background = p ? 'var(--accent)' : 'var(--bg-elevated)';
        avatar.textContent = p ? p.letter : 'A';
      }
      var bubble = document.createElement('div');
      bubble.className = 'agent-sam-bubble';
      bubble.textContent = m.content;
      div.appendChild(avatar);
      div.appendChild(bubble);
      wrap.appendChild(div);
    });
    wrap.scrollTop = wrap.scrollHeight;
  }

  function loadConversation(convId) {
    if (!convId) return;
    fetcher(base + '/api/agent/conversations/' + encodeURIComponent(convId), { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d.messages && d.conversation) {
          messages.length = 0;
          d.messages.forEach(function (m) {
            if (m.role === 'user' || m.role === 'assistant') {
              messages.push({ role: m.role, content: m.content, provider: m.provider });
            }
          });
          currentConversationId = d.conversation.id;
          if (emptyEl) emptyEl.style.display = messages.length ? 'none' : '';
          renderMessagesOnly();
        }
      })
      .catch(function () {});
  }

  function loadLastConversation() {
    fetcher(base + '/api/agent/conversations', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var list = d.conversations || [];
        if (list.length) loadConversation(list[0].id);
      })
      .catch(function () {});
  }

  function sendMessage() {
    if (agentBusy) {
      if (abortController) abortController.abort();
      return;
    }
    var text = inputEl.value.trim();
    if (!text && !pendingAttachUrl) return;
    var contentToSend = text;
    var attachUrlForBubble = pendingAttachUrl || null;
    if (pendingAttachUrl) {
      contentToSend = (text ? text + '\n\n' : '') + '[Attached image: ' + pendingAttachUrl + ']';
      pendingAttachUrl = null;
      pendingAttachName = null;
      renderAttachedPill();
    }
    inputEl.value = '';
    messages.push({ role: 'user', content: contentToSend });
    var displayContent = attachUrlForBubble && contentToSend.indexOf('[Attached image:') !== -1
      ? contentToSend.replace(/\n\n\[Attached image: [^\]]+\]$/, '').trim() || 'Image attached'
      : contentToSend;
    appendMessage('user', displayContent, null, attachUrlForBubble);
    abortController = new AbortController();
    setAgentBusy(true);

    fetcher(base + '/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        messages: messages,
        conversation_id: currentConversationId,
        agent_mode: 'agent_sam',
        model_id: activeProvider,
        current_page: window.location.pathname || ''
      }),
      signal: abortController.signal
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d.conversation_id) currentConversationId = d.conversation_id;
        var content = (d.message && d.message.content) ? d.message.content : (d.error || 'No response');
        messages.push({ role: 'assistant', content: content, provider: d.provider });
        appendMessage('assistant', content, d.provider || activeProvider);
        if (!getCodeValue().trim()) setCodeValue(content);
        if (typeof loadBudget === 'function') setTimeout(loadBudget, 1500);
      })
      .catch(function (e) {
        if (e.name === 'AbortError') return;
        var err = 'Error: ' + (e.message || 'Request failed');
        appendMessage('assistant', err, null);
      })
      .finally(function () { setAgentBusy(false); abortController = null; });
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  setProvider(activeProvider);
  loadLastConversation();

  // Models: count + popup with provider tabs and clickable list
  const modelsCountEl = document.getElementById('agentSamModelsCount');
  const modelsBtn = document.getElementById('agentSamModelsBtn');
  const modelsDropdown = document.getElementById('agentSamModelsDropdown');
  const modelsListPopup = document.getElementById('agentSamModelsListPopup');
  function loadModelsCount() {
    fetcher(base + '/api/agent/models', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) { if (modelsCountEl) modelsCountEl.textContent = (d && d.total) != null ? d.total : '—'; })
      .catch(function () { if (modelsCountEl) modelsCountEl.textContent = '—'; });
  }
  loadModelsCount();
  function renderModelsForProvider(providerId) {
    if (!modelsListPopup) return;
    modelsListPopup.innerHTML = '';
    fetcher(base + '/api/agent/models?provider=' + encodeURIComponent(providerId), { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var list = (d && d.models) ? d.models : [];
        if (list.length === 0) {
          var li = document.createElement('li');
          li.className = 'empty';
          li.textContent = 'No models for this provider. Set provider on each row in agent_ai_sam.';
          modelsListPopup.appendChild(li);
          return;
        }
        list.forEach(function (m) {
          var li = document.createElement('li');
          li.textContent = (m.name || m.id) + (m.mode ? ' · ' + m.mode : '');
          li.setAttribute('data-provider', m.provider || providerId);
          li.addEventListener('click', function () {
            var p = this.getAttribute('data-provider') || providerId;
            if (p) setProvider(p);
            closeModelsPopup();
          });
          modelsListPopup.appendChild(li);
        });
      })
      .catch(function () {
        var li = document.createElement('li');
        li.className = 'empty';
        li.textContent = 'Could not load models.';
        modelsListPopup.appendChild(li);
      });
  }
  if (modelsBtn && modelsDropdown) {
    function closeModelsPopup() {
      modelsDropdown.setAttribute('hidden', '');
      modelsDropdown.style.display = 'none';
    }
    modelsBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      var wasHidden = modelsDropdown.hasAttribute('hidden');
      if (wasHidden) {
        modelsDropdown.removeAttribute('hidden');
        modelsDropdown.style.display = 'flex';
        document.querySelectorAll('.agent-sam-models-tab').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-provider') === activeProvider);
        });
        renderModelsForProvider(activeProvider);
      } else {
        closeModelsPopup();
      }
    });
    modelsDropdown.addEventListener('click', function (e) {
      if (e.target === modelsDropdown) closeModelsPopup();
    });
    document.querySelectorAll('.agent-sam-models-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.agent-sam-models-tab').forEach(function (b) { b.classList.remove('active'); });
        this.classList.add('active');
        var p = this.getAttribute('data-provider');
        if (p) renderModelsForProvider(p);
      });
    });
    var popupCloseBtn = document.getElementById('agentSamModelsPopupClose');
    if (popupCloseBtn) popupCloseBtn.addEventListener('click', closeModelsPopup);
    document.addEventListener('click', function (e) {
      if (!modelsDropdown.contains(e.target) && e.target !== modelsBtn) closeModelsPopup();
    });
  }

  // Budget pie + Recent usage table from /api/finance/ai-spend?scope=agent
  const BUDGET_CAP = 70;
  const budgetPieEl = document.getElementById('agentSamBudgetPie');
  const budgetLabelEl = document.getElementById('agentSamBudgetLabel');
  const usagePanel = document.getElementById('agentSamUsagePanel');
  const usageTableBody = document.getElementById('agentSamUsageTable') && document.getElementById('agentSamUsageTable').tBodies[0];
  const usageEmptyEl = document.getElementById('agentSamUsageEmpty');

  function updateBudgetPie(used) {
    if (!budgetPieEl || !budgetLabelEl) return;
    var u = Number(used) || 0;
    var pct = Math.min(100, (u / BUDGET_CAP) * 100);
    budgetPieEl.style.background = 'conic-gradient(#fff 0deg, #fff ' + (pct * 3.6) + 'deg, rgba(255,255,255,0.22) ' + (pct * 3.6) + 'deg, rgba(255,255,255,0.22) 360deg)';
    budgetLabelEl.textContent = '$' + (u.toFixed(1)) + ' / $' + BUDGET_CAP;
  }

  function renderUsageTable(rows) {
    if (!usageTableBody || !usageEmptyEl) return;
    var list = (rows && Array.isArray(rows)) ? rows.slice(0, 50) : [];
    usageEmptyEl.style.display = list.length ? 'none' : 'block';
    usageTableBody.innerHTML = '';
    for (var i = 0; i < list.length; i++) {
      var r = list[i];
      var date = r.date || '—';
      if (r.occurred_at != null) {
        var d = new Date(Number(r.occurred_at) * 1000);
        date = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      var service = (r.service || r.description || '—').toString().slice(0, 32);
      var provider = (r.provider_slug || r.provider || '—').toString().replace('_api', '').replace('_', ' ');
      var cost = r.amount_usd != null ? '$' + Number(r.amount_usd).toFixed(4) : '—';
      var notes = (r.notes || '—').toString().slice(0, 40);
      var tr = document.createElement('tr');
      tr.innerHTML = '<td>' + date + '</td><td title="' + (r.description || '').replace(/"/g, '&quot;') + '">' + service + '</td><td>' + provider + '</td><td>' + cost + '</td><td>' + notes + '</td>';
      usageTableBody.appendChild(tr);
    }
  }

  if (document.getElementById('agentSamUsageBtn') && usagePanel) {
    document.getElementById('agentSamUsageBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      usagePanel.hidden = !usagePanel.hidden;
    });
    document.addEventListener('click', function (e) {
      if (usagePanel && !usagePanel.hidden && !usagePanel.contains(e.target) && e.target.id !== 'agentSamUsageBtn') {
        usagePanel.hidden = true;
      }
    });
  }

  function loadBudget() {
    fetcher(base + '/api/finance/ai-spend?scope=agent', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var used = (d && d.summary && d.summary.total_this_month != null) ? d.summary.total_this_month : 0;
        updateBudgetPie(used);
        if (d && d.rows && Array.isArray(d.rows)) renderUsageTable(d.rows);
        else renderUsageTable([]);
      })
      .catch(function () {
        updateBudgetPie(0);
        renderUsageTable([]);
      });
  }
  loadBudget();
})();
</script>

    <!-- Footer chat pane: context gauge, $ gauge, scrollable chat -->
    <div id="agent-footer-chat" class="collapsed" aria-label="Agent chat and gauges">
      <div class="agent-footer-chat-bar">
        <span class="gauge context" id="agent-footer-context-gauge" title="Estimated context (tokens)">Context <span id="agent-footer-context-value">0</span>k / 128k</span>
        <span class="gauge dollars" id="agent-footer-dollar-gauge" title="AI spend this month">$<span id="agent-footer-dollar-value">0.00</span></span>
        <button type="button" class="agent-footer-expand" id="agent-footer-expand-btn" aria-expanded="false" aria-controls="agent-footer-pane">Chat ▼</button>
      </div>
      <div class="agent-footer-pane" id="agent-footer-pane">
        <div id="agent-footer-chat-messages" tabindex="0"></div>
        <div id="agent-footer-chat-input-row">
          <textarea id="agent-footer-chat-input" placeholder="Message…" rows="1"></textarea>
          <button type="button" class="send" id="agent-footer-chat-send">Send</button>
        </div>
      </div>
    </div>

    <script>
    (function () {
      var footerChat = document.getElementById('agent-footer-chat');
      var expandBtn = document.getElementById('agent-footer-expand-btn');
      var pane = document.getElementById('agent-footer-pane');
      var messagesEl = document.getElementById('agent-footer-chat-messages');
      var inputEl = document.getElementById('agent-footer-chat-input');
      var sendBtn = document.getElementById('agent-footer-chat-send');
      var contextValueEl = document.getElementById('agent-footer-context-value');
      var dollarValueEl = document.getElementById('agent-footer-dollar-value');
      var CONTEXT_LIMIT_K = 128;
      var footerMessages = [];

      function updateContextGauge() {
        if (!contextValueEl) return;
        var totalChars = footerMessages.reduce(function (sum, m) { return sum + (m.content || '').length; }, 0);
        var tokens = Math.round(totalChars / 4);
        var k = (tokens / 1000).toFixed(1);
        contextValueEl.textContent = k;
      }
      function appendFooterMessage(role, content) {
        if (!messagesEl) return;
        var div = document.createElement('div');
        div.className = 'agent-footer-msg ' + role;
        div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      function loadDollarGauge() {
        var base = window.location.origin;
        var fetcher = window.dashboardFetch || fetch;
        fetcher(base + '/api/finance/ai-spend?scope=agent', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var used = (d && d.summary && d.summary.total_this_month != null) ? d.summary.total_this_month : (d && d.total_usd != null ? d.total_usd : 0);
            if (dollarValueEl) dollarValueEl.textContent = (Number(used) || 0).toFixed(2);
          })
          .catch(function () { if (dollarValueEl) dollarValueEl.textContent = '0.00'; });
      }

      if (expandBtn && footerChat && pane) {
        expandBtn.addEventListener('click', function () {
          var collapsed = footerChat.classList.toggle('collapsed');
          expandBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          expandBtn.textContent = collapsed ? 'Chat ▼' : 'Chat ▲';
        });
      }
      loadDollarGauge();
      setInterval(loadDollarGauge, 60000);

      if (sendBtn && inputEl && messagesEl) {
        sendBtn.addEventListener('click', function () {
          var raw = inputEl.value.trim();
          if (!raw) return;
          inputEl.value = '';
          footerMessages.push({ role: 'user', content: raw });
          appendFooterMessage('user', raw);
          updateContextGauge();
          sendBtn.disabled = true;
          var prefer = (function () { try { return sessionStorage.getItem('agent_sam_prefer_provider') || 'workers_ai'; } catch (_) { return 'workers_ai'; } })();
          fetch(window.location.origin + '/api/agent/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: footerMessages, prefer_provider: prefer, current_page: window.location.pathname || '' })
          }).then(function (r) { return r.json(); }).then(function (d) {
            var content = (d.ok && d.message && d.message.content) ? d.message.content : ('Error: ' + (d.error || 'No response'));
            footerMessages.push({ role: 'assistant', content: content });
            appendFooterMessage('assistant', content);
            updateContextGauge();
          }).catch(function (e) {
            footerMessages.push({ role: 'assistant', content: 'Error: ' + e.message });
            appendFooterMessage('assistant', 'Error: ' + e.message);
            updateContextGauge();
          }).finally(function () { sendBtn.disabled = false; });
        });
        inputEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
        });
      }
    })();
