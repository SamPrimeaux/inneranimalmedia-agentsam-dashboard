<script>!function(){try{var css=localStorage.getItem("dashboard-theme-css");if(css){var s=document.createElement("style");s.id="theme-dyn-pre";document.head.appendChild(s);s.textContent=css;}var t=localStorage.getItem("dashboard-theme")||"meaux-storm-gray";document.documentElement.setAttribute("data-theme",t);}catch(e){}}();</script>
<style>
.kanban-modal-overlay { position: fixed; inset: 0; background: var(--bg-overlay, rgba(0,0,0,0.6)); z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 16px; }
.kanban-modal { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.kanban-modal h3 { margin: 0 0 16px; font-size: 16px; font-weight: 600; color: var(--text-primary); }
.kanban-modal .field { margin-bottom: 14px; }
.kanban-modal .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.kanban-modal input, .kanban-modal textarea { width: 100%; background: var(--bg-canvas); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; color: var(--text-primary); box-sizing: border-box; }
.kanban-modal textarea { min-height: 72px; resize: vertical; }
.kanban-modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.kanban-modal .btn { padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.kanban-modal .btn-secondary { background: color-mix(in srgb, var(--text-primary) 8%, transparent); color: var(--text-secondary); }
.kanban-modal .btn-primary { background: var(--accent); color: #fff; }
.kanban-toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-width: 360px; }
.kanban-toast.success { background: var(--success); color: var(--bg-canvas); }
.kanban-toast.error { background: var(--error); color: #fff; }
</style>

<div class="page-header" style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;">
    <div>
        <h1 class="page-title">Kanban</h1>
        <p class="page-subtitle">Tasks: To Do · In Progress · Done — data-driven, CRUD-capable</p>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <label style="color:var(--text-secondary);font-size:13px;">Board</label>
        <select id="kanban-board-select" style="background:var(--bg-canvas);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text-primary);font-size:14px;min-width:220px;">
            <option value="">— Loading —</option>
        </select>
        <button type="button" id="kanban-new-board-btn" class="btn btn-secondary" style="padding:8px 14px;">+ New board</button>
    </div>
</div>

<div id="kanban-loading" style="padding:32px;text-align:center;color:var(--text-secondary);">Loading board…</div>
<div id="kanban-empty" style="display:none;padding:32px;text-align:center;color:var(--text-secondary);">
    <p>No boards yet. Create one to start planning.</p>
    <button type="button" id="kanban-create-first-board" class="btn btn-primary" style="margin-top:12px;">+ Create first board</button>
</div>
<div id="kanban-board" style="display:none;overflow-x:auto;padding-bottom:24px;">
    <div id="kanban-columns" style="display:grid;gap:16px;margin-bottom:24px;min-width:min-content;" class="kanban-columns-grid"></div>
</div>

<!-- Add Task modal (no prompt) -->
<div id="kanban-modal-task" class="kanban-modal-overlay" style="display:none;">
    <div class="kanban-modal">
        <h3>Add task</h3>
        <div class="field"><label>Title</label><input type="text" id="kanban-task-title" placeholder="Task title"></div>
        <div class="field"><label>Description (optional)</label><textarea id="kanban-task-desc" placeholder="Notes…"></textarea></div>
        <div class="field"><label>Due date (optional)</label><input type="date" id="kanban-task-due"></div>
        <div class="actions">
            <button type="button" class="btn btn-secondary" id="kanban-task-cancel">Cancel</button>
            <button type="button" class="btn btn-primary" id="kanban-task-submit">Add task</button>
        </div>
    </div>
</div>
<!-- New Board modal -->
<div id="kanban-modal-board" class="kanban-modal-overlay" style="display:none;">
    <div class="kanban-modal">
        <h3>New board</h3>
        <div class="field"><label>Board name</label><input type="text" id="kanban-board-name" placeholder="e.g. My Week, Q1 Goals"></div>
        <div class="field"><label>Description (optional)</label><input type="text" id="kanban-board-desc" placeholder="What this board is for"></div>
        <div class="actions">
            <button type="button" class="btn btn-secondary" id="kanban-board-cancel">Cancel</button>
            <button type="button" class="btn btn-primary" id="kanban-board-submit">Create board</button>
        </div>
    </div>
</div>
<!-- Delete confirm modal -->
<div id="kanban-modal-delete" class="kanban-modal-overlay" style="display:none;">
    <div class="kanban-modal">
        <h3>Delete task?</h3>
        <p style="color:var(--text-secondary);font-size:14px;margin:0 0 20px;">This cannot be undone.</p>
        <div class="actions">
            <button type="button" class="btn btn-secondary" id="kanban-delete-cancel">Keep</button>
            <button type="button" class="btn btn-primary" id="kanban-delete-confirm" style="background:var(--error);">Delete</button>
        </div>
    </div>
</div>

<script>
(function () {
    var state = { boards: [], columns: [], tasks: [], currentBoardId: null, addTaskColumnId: null, deleteTaskId: null };
    var boardSelect = document.getElementById('kanban-board-select');
    var loadingEl = document.getElementById('kanban-loading');
    var emptyEl = document.getElementById('kanban-empty');
    var boardEl = document.getElementById('kanban-board');
    var columnsEl = document.getElementById('kanban-columns');

    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function api(path, opts) {
        opts = opts || {};
        return fetch(path, { method: opts.method || 'GET', headers: opts.headers || {}, body: opts.body }).then(function(r) { return r.json(); });
    }
    function toast(msg, type) {
        type = type || 'success';
        var t = document.createElement('div');
        t.className = 'kanban-toast ' + type;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function() { t.remove(); }, 4000);
    }

    function loadBoards() {
        return api('/api/kanban/boards').then(function(data) {
            state.boards = (data.boards || []);
            var sel = document.getElementById('kanban-board-select');
            sel.innerHTML = state.boards.length ? state.boards.map(function(b) { return '<option value="' + esc(b.id) + '">' + esc(b.name) + '</option>'; }).join('') : '<option value="">— No boards —</option>';
            if (state.boards.length && !state.currentBoardId) {
                state.currentBoardId = state.boards[0].id;
                sel.value = state.currentBoardId;
            }
            if (state.currentBoardId) sel.value = state.currentBoardId;
            if (state.boards.length === 0) { loadingEl.style.display = 'none'; emptyEl.style.display = 'block'; boardEl.style.display = 'none'; return; }
            emptyEl.style.display = 'none';
            loadBoardData();
        }).catch(function() { loadingEl.textContent = 'Failed to load boards.'; });
    }

    function loadBoardData() {
        if (!state.currentBoardId) return;
        loadingEl.style.display = 'block';
        boardEl.style.display = 'none';
        Promise.all([
            api('/api/kanban/boards/' + state.currentBoardId + '/columns'),
            api('/api/kanban/boards/' + state.currentBoardId + '/tasks')
        ]).then(function(results) {
            state.columns = (results[0].columns || []).sort(function(a,b) { return (a.position || 0) - (b.position || 0); });
            state.tasks = results[1].tasks || [];
            loadingEl.style.display = 'none';
            boardEl.style.display = 'block';
            render();
        }).catch(function() { loadingEl.textContent = 'Failed to load board.'; loadingEl.style.display = 'block'; });
    }

    function tasksByColumn(columnId) {
        return state.tasks.filter(function(t) { return t.column_id === columnId; }).sort(function(a,b) { return (a.position || 0) - (b.position || 0) || (a.created_at || 0) - (b.created_at || 0); });
    }

    function render() {
        if (!state.columns.length) {
            columnsEl.innerHTML = '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--text-secondary);">No columns on this board. Create a new board to get To Do / In Progress / Done.</div>';
            return;
        }
        var gridCols = state.columns.length;
        columnsEl.style.gridTemplateColumns = 'repeat(' + gridCols + ', minmax(280px, 1fr))';
        columnsEl.innerHTML = state.columns.map(function(col) {
            var tasks = tasksByColumn(col.id);
            var taskHtml = tasks.map(function(t) {
                var due = t.due_date ? new Date(t.due_date * 1000).toLocaleDateString() : '';
                return '<li class="kanban-task-card" data-task-id="' + esc(t.id) + '" style="list-style:none;margin-bottom:8px;padding:12px;background:var(--bg-canvas);border:1px solid var(--border);border-radius:8px;">' +
                    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
                    '<span style="font-size:14px;color:var(--text-primary);flex:1;">' + esc(t.title) + '</span>' +
                    '<button type="button" class="kanban-task-del" data-task-id="' + esc(t.id) + '" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:2px 6px;flex-shrink:0;" title="Delete">×</button>' +
                    '</div>' +
                    (t.description ? '<p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;white-space:pre-wrap;">' + esc(t.description) + '</p>' : '') +
                    (due ? '<p style="font-size:11px;color:var(--text-secondary);margin:4px 0 0;">Due ' + esc(due) + '</p>' : '') +
                    '<div style="margin-top:8px;"><select class="kanban-task-move" data-task-id="' + esc(t.id) + '" style="width:100%;font-size:11px;padding:4px;background:var(--bg-canvas);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);">' +
                    '<option value="">Move to…</option>' + state.columns.filter(function(c) { return c.id !== col.id; }).map(function(c) { return '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>'; }).join('') +
                    '</select></div>' +
                    '</li>';
            }).join('');
            return '<div class="kanban-column card" data-column-id="' + esc(col.id) + '" style="min-width:280px;">' +
                '<h3 style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary);">' + esc(col.name) + '</h3>' +
                '<ul class="kanban-column-list" style="list-style:none;margin:0;padding:0;min-height:60px;">' + taskHtml + '</ul>' +
                '<button type="button" class="kanban-add-task btn btn-primary" data-column-id="' + esc(col.id) + '" style="margin-top:8px;width:100%;">+ Add</button>' +
                '</div>';
        }).join('');

        columnsEl.querySelectorAll('.kanban-task-del').forEach(function(btn) {
            btn.onclick = function() { openDeleteModal(btn.getAttribute('data-task-id')); };
        });
        columnsEl.querySelectorAll('.kanban-task-move').forEach(function(sel) {
            sel.onchange = function() {
                var colId = sel.value; if (!colId) return;
                moveTask(sel.getAttribute('data-task-id'), colId);
                sel.value = '';
            };
        });
        columnsEl.querySelectorAll('.kanban-add-task').forEach(function(btn) {
            btn.onclick = function() { openAddTaskModal(btn.getAttribute('data-column-id')); };
        });
    }

    function openAddTaskModal(columnId) {
        state.addTaskColumnId = columnId;
        document.getElementById('kanban-task-title').value = '';
        document.getElementById('kanban-task-desc').value = '';
        document.getElementById('kanban-task-due').value = '';
        document.getElementById('kanban-modal-task').style.display = 'flex';
        document.getElementById('kanban-task-title').focus();
    }
    function closeAddTaskModal() {
        document.getElementById('kanban-modal-task').style.display = 'none';
        state.addTaskColumnId = null;
    }
    document.getElementById('kanban-task-cancel').onclick = closeAddTaskModal;
    document.getElementById('kanban-task-submit').onclick = function() {
        var title = document.getElementById('kanban-task-title').value.trim();
        if (!title) { toast('Enter a task title', 'error'); return; }
        var desc = document.getElementById('kanban-task-desc').value.trim();
        var due = document.getElementById('kanban-task-due').value || null;
        closeAddTaskModal();
        api('/api/kanban/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ board_id: state.currentBoardId, column_id: state.addTaskColumnId, title: title, description: desc || null, due_date: due }) })
            .then(function(data) { if (data.success) { loadBoardData(); toast('Task added'); } else toast(data.error || 'Failed', 'error'); })
            .catch(function() { toast('Failed to add task', 'error'); });
    };

    function openDeleteModal(taskId) {
        state.deleteTaskId = taskId;
        document.getElementById('kanban-modal-delete').style.display = 'flex';
    }
    function closeDeleteModal() {
        document.getElementById('kanban-modal-delete').style.display = 'none';
        state.deleteTaskId = null;
    }
    document.getElementById('kanban-delete-cancel').onclick = closeDeleteModal;
    document.getElementById('kanban-delete-confirm').onclick = function() {
        var id = state.deleteTaskId;
        closeDeleteModal();
        if (!id) return;
        api('/api/kanban/tasks/' + encodeURIComponent(id), { method: 'DELETE' })
            .then(function(data) { if (data.success) { loadBoardData(); toast('Task deleted'); } else toast(data.error || 'Failed', 'error'); })
            .catch(function() { toast('Failed to delete', 'error'); });
    };

    function moveTask(taskId, columnId) {
        api('/api/kanban/tasks/' + encodeURIComponent(taskId), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ column_id: columnId }) })
            .then(function(data) { if (data.success) loadBoardData(); else toast(data.error || 'Failed', 'error'); })
            .catch(function() { toast('Failed to move task', 'error'); });
    }

    function openNewBoardModal() {
        document.getElementById('kanban-board-name').value = '';
        document.getElementById('kanban-board-desc').value = '';
        document.getElementById('kanban-modal-board').style.display = 'flex';
        document.getElementById('kanban-board-name').focus();
    }
    function closeNewBoardModal() {
        document.getElementById('kanban-modal-board').style.display = 'none';
    }
    document.getElementById('kanban-board-cancel').onclick = closeNewBoardModal;
    document.getElementById('kanban-board-submit').onclick = function() {
        var name = document.getElementById('kanban-board-name').value.trim();
        if (!name) { toast('Enter a board name', 'error'); return; }
        var desc = document.getElementById('kanban-board-desc').value.trim();
        closeNewBoardModal();
        api('/api/kanban/boards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, description: desc || null }) })
            .then(function(data) {
                if (data.success) {
                    state.currentBoardId = data.id;
                    loadBoards().then(function() { createDefaultColumns(data.id); });
                    toast('Board created');
                } else toast(data.error || 'Failed', 'error');
            })
            .catch(function() { toast('Failed to create board', 'error'); });
    };

    function createDefaultColumns(boardId) {
        var defaults = [{ name: 'To Do', position: 0 }, { name: 'In Progress', position: 1 }, { name: 'Done', position: 2 }];
        var i = 0;
        function next() {
            if (i >= defaults.length) { loadBoardData(); return; }
            var col = defaults[i++];
            api('/api/kanban/boards/' + boardId + '/columns', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(col) })
                .then(function() { next(); }).catch(function() { next(); });
        }
        next();
    }

    boardSelect.addEventListener('change', function() {
        state.currentBoardId = boardSelect.value || null;
        if (state.currentBoardId) loadBoardData(); else { loadingEl.style.display = 'none'; boardEl.style.display = 'none'; }
    });
    document.getElementById('kanban-new-board-btn').onclick = openNewBoardModal;
    document.getElementById('kanban-create-first-board').onclick = openNewBoardModal;

    loadBoards();
})();
</script>
