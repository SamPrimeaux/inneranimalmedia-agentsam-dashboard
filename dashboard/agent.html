<!DOCTYPE html>
<html lang="en" data-theme="meaux-glass-blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Agent — Inner Animal Media</title>
    <!-- CRITICAL: Theme must load BEFORE any visible content -->
    <script>
    (function() {
        const saved = localStorage.getItem('dashboard-theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
        }
        // Preload theme CSS vars to prevent flash
        const savedVars = localStorage.getItem('dashboard-theme-vars');
        if (savedVars) {
            const style = document.createElement('style');
            style.id = 'theme-preload-inject';
            style.textContent = savedVars;
            document.head.appendChild(style);
        }
    })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://pub-b845a8f899834f0faf95dc83eda3c505.r2.dev/static/dashboard/styles_themes.css">
    <link rel="stylesheet" href="/static/dashboard/shell.css">
    <style>
        /* === THEME SYSTEM === */
        :root {
            --bg-active: var(--bg-hover);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --safe-area-top: env(safe-area-inset-top, 0);
            --safe-area-bottom: env(safe-area-inset-bottom, 0);
            --safe-area-left: env(safe-area-inset-left, 0);
            --safe-area-right: env(safe-area-inset-right, 0);
            --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --logo-dark: url('https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/8e323ffb-4338-41dc-1f71-9c7bdc57bb00/thumbnail');
            --logo-light: url('https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/ac515729-af6b-4ea5-8b10-e581a4d02100/thumbnail');
        }

        /* Voice input recording indicator */
        @keyframes agent-mic-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }

        /* === RESET & BASE === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; overflow-x: hidden; }
        body {
            font-family: var(--font-family);
            background: var(--bg-canvas);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 100vw;
        }

        /* === LAYOUT === */
        :root { --dashboard-sidenav-width: 240px; }
        .app-container {
            display: flex;
            flex: 1;
            min-height: 0;
            min-width: 0;
            height: 100%;
            overflow: hidden;
            max-width: 100%;
        }

        /* === TOPBAR === */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 9000;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border-nav);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            min-width: 0;
            overflow-x: hidden;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; color: var(--text-nav); }
        .topbar-center { flex: 1; display: flex; justify-content: center; }
        .topbar-right { display: flex; align-items: center; gap: 16px; color: var(--text-nav); }
        
        .hamburger {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }
        .hamburger span {
            width: 20px;
            height: 2px;
            background: var(--text-nav);
            transition: var(--transition);
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translateY(7px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translateY(-7px); }
        
        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
        }

        .search-wrap { position: relative; flex: 1; max-width: 360px; display: flex; align-items: center; }
        .search-wrap .search-input { width: 100%; padding: 8px 12px 8px 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: var(--text-nav); font-size: 14px; outline: none; transition: var(--transition); }
        .search-wrap .search-input::placeholder { color: var(--text-nav-muted); }
        .search-wrap .search-input:focus { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.35); }
        .search-wrap .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-nav-muted); }
        .search-dropdown { position: fixed; margin-top: 4px; max-height: 280px; overflow-y: auto; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 10001; display: none; }
        .search-dropdown.open { display: block; }
        .search-dropdown .item { padding: 10px 12px; font-size: 13px; color: var(--text-primary); cursor: pointer; border-bottom: 1px solid var(--border); }
        .search-dropdown .item:hover { background: var(--bg-canvas); }
        .search-dropdown .item:last-child { border-bottom: none; }
        .search-mobile-btn { display: none; border: none; background: transparent; cursor: pointer; padding: 8px; color: var(--text-nav); border-radius: 8px; }
        .topbar-right { position: relative; }
        .nav-icon-btn { color: var(--text-nav); }

        @media (max-width: 768px) {
            .search-wrap .search-input { display: none; }
            .search-wrap .search-dropdown { left: 0; right: auto; width: 280px; }
            .search-mobile-btn { display: inline-flex; align-items: center; justify-content: center; }
            .search-wrap.expanded .search-input { display: block; }
            .search-wrap.expanded .search-mobile-btn { display: none; }
        }
        
        @media (min-width: 769px) {
            .search-mobile-btn { display: none !important; }
        }
        
        .workspace-switcher {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(15, 23, 42, 0.4);
            color: var(--text-nav);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        /* === SIDENAV === */
        /* Sidenav shell */
        .sidenav {
            flex-shrink: 0;
            width: var(--dashboard-sidenav-width);
            min-width: var(--dashboard-sidenav-width);
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-nav);
            border-right: 1px solid var(--border);
            transition: width 150ms cubic-bezier(0.4,0,0.2,1),
                min-width 150ms cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }

        /* Header */
        .sidenav-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            padding: 12px 12px 8px;
            flex-shrink: 0;
        }
        .sidenav-logo-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 14px;
            min-width: 0;
        }
        #sidenavToggle {
            margin-left: auto;
        }
        .sidenav-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            transition: color 150ms, background 150ms;
        }
        .sidenav-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .sidenav.collapsed .sidenav-toggle svg {
            transform: rotate(180deg);
        }
        .sidenav-header .sidenav-settings-btn {
            margin-left: 0;
            margin-right: 0;
        }

        /* New chat button */
        .sidenav-actions {
            padding: 4px 8px 8px;
            flex-shrink: 0;
        }
        .sidenav-new-chat {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 6px;
            background: var(--accent);
            color: var(--text-nav);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 150ms;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidenav-new-chat:hover { opacity: 0.88; }
        .sidenav-new-chat svg { flex-shrink: 0; }

        /* Search */
        .sidenav-search-wrap {
            padding: 0 8px 8px;
            flex-shrink: 0;
        }
        .sidenav-search-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            transition: border-color 150ms, color 150ms;
        }
        .sidenav-search-btn:hover {
            border-color: var(--accent);
            color: var(--text-secondary);
        }

        /* Nav */
        .sidenav-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 8px 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .nav-group {
            margin-bottom: 4px;
        }
        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 12px 8px 4px;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 150ms;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            transition: background 150ms, color 150ms;
            cursor: pointer;
        }
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: var(--bg-active);
            color: var(--accent);
            font-weight: 500;
        }
        .nav-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* Footer */
        .sidenav-footer {
            flex-shrink: 0;
            padding: 8px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidenav-footer-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            text-decoration: none;
            transition: background 150ms, color 150ms;
            flex-shrink: 0;
        }
        .sidenav-footer-icon:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidenav-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 4px;
            border-radius: 6px;
            transition: background 150ms;
        }
        .sidenav-profile:hover { background: var(--bg-hover); }
        .sidenav-avatar-img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
        }
        .sidenav-profile-name {
            font-size: 12px;
            color: var(--text-secondary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sidenav-logout-btn {
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .sidenav-logout-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Collapsed state */
        .sidenav.collapsed .sidenav-logo-text,
        .sidenav.collapsed .sidenav-new-chat span,
        .sidenav.collapsed .sidenav-search-btn span,
        .sidenav.collapsed .nav-section-label,
        .sidenav.collapsed .nav-item span,
        .sidenav.collapsed .sidenav-profile-name,
        .sidenav.collapsed .sidenav-logout-btn {
            display: none;
        }
        .sidenav.collapsed .sidenav-new-chat {
            justify-content: center;
            padding: 7px;
        }
        .sidenav.collapsed .sidenav-search-btn {
            justify-content: center;
            padding: 6px;
        }
        .sidenav.collapsed .nav-item {
            justify-content: center;
            padding: 6px;
        }
        .sidenav.collapsed .sidenav-footer-icon {
            margin: 0 auto;
        }
        .sidenav.collapsed .sidenav-profile {
            justify-content: center;
        }

        @media (max-width: 768px) {
            .sidenav {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 95;
                transform: translateX(-100%);
                transition: transform 200ms cubic-bezier(0.4,0,0.2,1);
                width: 240px;
                min-width: 240px;
                flex-shrink: 0;
            }
            .sidenav.open {
                transform: translateX(0);
            }
        }

        /* === MAIN CONTENT === */
        .main-content {
            flex: 1;
            height: 100%;
            overflow: hidden;
            padding: 24px;
            min-height: 0;
            min-width: 0;
            max-width: 100%;
        }
        /* Agent page: flush with shell (no gap between header/sidenav and panel) */
        .main-content.agent-page-main {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 60px);
            max-height: calc(100vh - 60px);
        }
        .main-content.agent-page-main #agent-dashboard-root {
            flex: 1;
            min-height: 0;
            height: 100%;
        }
        /* Hide old footer chat bar and mobile footer on agent page (React app has its own input row) */
        body.agent-dashboard-page #agent-footer-chat,
        body.agent-dashboard-page .dashboard-mobile-footer {
            display: none !important;
        }
        body.agent-dashboard-page {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding-bottom: 0 !important;
        }
        /* Prevent wide content (tables, pre, code) from causing horizontal scroll on mobile */
        .main-content pre,
        .main-content code,
        .main-content table {
            max-width: 100%;
            overflow-x: auto;
        }
        
        .page-header {
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* === MOBILE === */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            z-index: 90;
            display: none;
        }
        .overlay.active { display: block; }

        /* Mobile-only sticky footer: fills iPhone bottom gap (safe area), matches header */
        .dashboard-mobile-footer {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            height: calc(12px + var(--safe-area-bottom, 0px));
            min-height: 12px;
            background: var(--bg-nav);
            border-top: 1px solid var(--border-nav);
        }
        @media (max-width: 768px) {
            .dashboard-mobile-footer { display: block; }
            body { padding-bottom: calc(12px + var(--safe-area-bottom, 0px)); }
            .main-content { padding: 16px 12px; }
            .topbar { padding: 0 12px; gap: 12px; }
            .hamburger { display: flex; }
            .workspace-switcher { display: none; }
        }
        
        @media (min-width: 769px) {
            .hamburger { display: none; }
        }
        
        /* === REDUCED MOTION === */
        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }

        /* === UTILITIES === */
        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <img id="ia-logo" class="app-logo" src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/ac515729-af6b-4ea5-8b10-e581a4d02100/thumbnail" alt="Inner Animal Media">
        </div>
        <div class="topbar-center" style="display: flex; align-items: center; gap: 16px;">
            <div class="search-wrap" id="searchWrap">
                <button type="button" class="search-mobile-btn" id="searchMobileBtn" aria-label="Search">
                    <svg class="nav-icon-btn" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search or type a command..." autocomplete="off">
                <div class="search-dropdown" id="searchDropdown">
                    <div class="search-dropdown-header" style="padding:8px 12px; font-size:11px; color: var(--text-secondary); text-transform: uppercase;">Recent</div>
                    <div class="item" data-url="/dashboard/overview">Overview</div>
                    <div class="item" data-url="/dashboard/user-settings">User Settings</div>
                    <div class="item" data-url="/dashboard/finance">Finance</div>
                    <div class="item" data-url="/dashboard/draw">Draw</div>
                    <div class="item" data-url="/dashboard/meet">Meet</div>
                </div>
            </div>
            <select class="workspace-switcher" id="workspaceSelect">
                <option value="ws_samprimeaux">Sam Primeaux Workspace</option>
            </select>
        </div>
        <div class="topbar-right">
            <button id="notifications-btn" class="nav-icon-btn" aria-label="Notifications" style="position: relative; border: none; background: transparent; cursor: pointer; padding: 6px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: inherit;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.172V11a6 6 0 1 0-12 0v3.172a2 2 0 0 1-.586 1.414L4 17h5" />
                    <path d="M9 21a3 3 0 0 0 6 0" />
                </svg>
                <span id="notifications-badge" style="position:absolute; top:4px; right:4px; min-width:14px; height:14px; border-radius:999px; background:#f97316; color:white; font-size:10px; line-height:14px; text-align:center; padding:0 3px; display:none;"></span>
            </button>
            <div id="notifications-dropdown" style="position:fixed; margin-top:8px; width:320px; max-height:420px; overflow-y:auto; background:var(--bg-elevated); border:1px solid var(--border); border-radius:12px; box-shadow:0 18px 45px rgba(0,0,0,0.15); padding:8px 0; display:none; z-index:10001;">
                <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 16px 6px 16px;">
                    <span style="font-size:13px; font-weight:600; color: var(--text-primary);">Notifications</span>
                    <button id="notifications-mark-all" style="border:none; background:none; color: var(--text-secondary); font-size:11px; cursor:pointer;">Mark all read</button>
                </div>
                <div id="notifications-list" style="border-top:1px solid var(--border); padding-top:4px;">
                    <div style="padding:12px 16px; font-size:13px; color: var(--text-secondary); text-align:center;">No notifications</div>
                </div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidenav -->
        <aside class="sidenav" id="sidenav">

            <!-- Rail header: logo + collapse toggle -->
            <div class="sidenav-header">
                <a href="/dashboard/agent" class="sidenav-logo-link">
                    <span class="sidenav-logo-text">IAM</span>
                </a>
                <button type="button" id="sidenavToggle"
                        class="sidenav-toggle"
                        aria-label="Collapse sidebar">
                    <svg viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         width="16" height="16">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <a href="/dashboard/user-settings"
                   class="sidenav-footer-icon sidenav-settings-btn"
                   title="Settings">
                    <svg viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"

      <div class="agent-footer-chat-bar">
        <span class="gauge context" id="agent-footer-context-gauge" title="Estimated context (tokens)">Context <span id="agent-footer-context-value">0</span>k / 128k</span>
        <span class="gauge dollars" id="agent-footer-dollar-gauge" title="AI spend this month">$<span id="agent-footer-dollar-value">0.00</span></span>
        <button type="button" class="agent-footer-expand" id="agent-footer-expand-btn" aria-expanded="false" aria-controls="agent-footer-pane">Chat ▼</button>
      </div>

    <script>
    (function () {
      var footerChat = document.getElementById('agent-footer-chat');
      var expandBtn = document.getElementById('agent-footer-expand-btn');
      var pane = document.getElementById('agent-footer-pane');
      var messagesEl = document.getElementById('agent-footer-chat-messages');
      var inputEl = document.getElementById('agent-footer-chat-input');
      var sendBtn = document.getElementById('agent-footer-chat-send');
      var contextValueEl = document.getElementById('agent-footer-context-value');
      var dollarValueEl = document.getElementById('agent-footer-dollar-value');
      var CONTEXT_LIMIT_K = 128;
      var footerMessages = [];

      function updateContextGauge() {
        if (!contextValueEl) return;
        var totalChars = footerMessages.reduce(function (sum, m) { return sum + (m.content || '').length; }, 0);
        var tokens = Math.round(totalChars / 4);
        var k = (tokens / 1000).toFixed(1);
        contextValueEl.textContent = k;
      }
      function appendFooterMessage(role, content) {
        if (!messagesEl) return;
        var div = document.createElement('div');
        div.className = 'agent-footer-msg ' + role;
        div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      function loadDollarGauge() {
        var base = window.location.origin;
        var fetcher = window.dashboardFetch || fetch;
        fetcher(base + '/api/finance/ai-spend?scope=agent', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var used = (d && d.summary && d.summary.total_this_month != null) ? d.summary.total_this_month : (d && d.total_usd != null ? d.total_usd : 0);
            if (dollarValueEl) dollarValueEl.textContent = (Number(used) || 0).toFixed(2);
          })
          .catch(function () { if (dollarValueEl) dollarValueEl.textContent = '0.00'; });
      }

      if (expandBtn && footerChat && pane) {
        expandBtn.addEventListener('click', function () {
          var collapsed = footerChat.classList.toggle('collapsed');
          expandBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          expandBtn.textContent = collapsed ? 'Chat ▼' : 'Chat ▲';
        });
      }
      loadDollarGauge();
      setInterval(loadDollarGauge, 60000);

      if (sendBtn && inputEl && messagesEl) {
        sendBtn.addEventListener('click', function () {
          var raw = inputEl.value.trim();
          if (!raw) return;
          inputEl.value = '';
          footerMessages.push({ role: 'user', content: raw });
          appendFooterMessage('user', raw);
          updateContextGauge();
          sendBtn.disabled = true;
          var prefer = (function () { try { return sessionStorage.getItem('agent_sam_prefer_provider') || 'workers_ai'; } catch (_) { return 'workers_ai'; } })();
          fetch(window.location.origin + '/api/agent/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: footerMessages, prefer_provider: prefer, current_page: window.location.pathname || '' })
          }).then(function (r) { return r.json(); }).then(function (d) {
            var content = (d.ok && d.message && d.message.content) ? d.message.content : ('Error: ' + (d.error || 'No response'));
            footerMessages.push({ role: 'assistant', content: content });
            appendFooterMessage('assistant', content);
            updateContextGauge();
          }).catch(function (e) {
            footerMessages.push({ role: 'assistant', content: 'Error: ' + e.message });
            appendFooterMessage('assistant', 'Error: ' + e.message);
            updateContextGauge();
          }).finally(function () { sendBtn.disabled = false; });
        });
        inputEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
        });
      }
    })();
    </script>

    <script>
        // Position fixed header dropdowns relative to viewport (escape stacking context)
        function positionHeaderDropdown(triggerEl, dropdownEl, align) {
            if (!triggerEl || !dropdownEl) return;
            var r = triggerEl.getBoundingClientRect();
            var gap = 8;
            if (align === 'left') {
                dropdownEl.style.left = r.left + 'px';
                dropdownEl.style.top = (r.bottom + 4) + 'px';
                dropdownEl.style.width = Math.max(r.width, 280) + 'px';
                dropdownEl.style.right = 'auto';
            } else {
                dropdownEl.style.top = (r.bottom + gap) + 'px';
                dropdownEl.style.right = (window.innerWidth - r.right) + 'px';
                dropdownEl.style.left = 'auto';
            }
        }

        // Theme-aware IA logo
        function updateHeaderLogo() {
            const theme = document.documentElement.getAttribute('data-theme') || 'meaux-glass-blue';
            const logoEl = document.getElementById('ia-logo');
            if (!logoEl) return;
            // For all current themes, use white logo on blue/dark backgrounds
            let src = 'https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/ac515729-af6b-4ea5-8b10-e581a4d02100/thumbnail';
            logoEl.src = src;
        }
        updateHeaderLogo();
        const themeObserver = new MutationObserver(updateHeaderLogo);
        themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        // Mobile nav toggle
        const hamburger = document.getElementById('hamburger');
        const sidenav = document.getElementById('sidenav');
        const overlay = document.getElementById('overlay');

        if (hamburger && sidenav && overlay) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('open');
                sidenav.classList.toggle('open');
                overlay.classList.toggle('active');
            });

            overlay.addEventListener('click', () => {
                hamburger.classList.remove('open');
                sidenav.classList.remove('open');
                overlay.classList.remove('active');
            });
        }

        // Shell nav intercept — load non-agent pages in React viewer
        document.querySelectorAll(
            '.sidenav-nav .nav-item, .sidenav-footer a[href], .sidenav-header a.sidenav-settings-btn'
        ).forEach(link => {
            const href = link.getAttribute('href');
            if (!href || href === '/dashboard/agent') return;
            link.addEventListener('click', function(e) {
                // Only intercept on desktop (sidenav not in mobile drawer mode)
                if (window.innerWidth <= 768) return;
                e.preventDefault();
                const embedUrl = href + (href.includes('?') ? '&' : '?') + 'embedded=1';
                window.dispatchEvent(new CustomEvent('iam_shell_nav', {
                    detail: { url: embedUrl }
                }));
            });
        });

        // Sidebar collapse (arrow) — persist in localStorage
        const sidenavToggle = document.getElementById('sidenavToggle');
        const SIDENAV_COLLAPSED_KEY = 'dashboard_sidenav_collapsed';
        function updateSidenavWidth() {
            const w = sidenav &&
                sidenav.classList.contains('collapsed') ? '52px' : '240px';
            document.documentElement.style.setProperty(
                '--dashboard-sidenav-width', w);
        }
        if (sidenavToggle && sidenav) {
            if (localStorage.getItem(SIDENAV_COLLAPSED_KEY) === '1') {
                sidenav.classList.add('collapsed');
                sidenavToggle.classList.remove('open');
            } else {
                sidenavToggle.classList.add('open');
            }
            updateSidenavWidth();
            sidenavToggle.addEventListener('click', () => {
                sidenav.classList.toggle('collapsed');
                sidenavToggle.classList.toggle('open', !sidenav.classList.contains('collapsed'));
                sidenavToggle.setAttribute('aria-label', sidenav.classList.contains('collapsed') ? 'Expand sidebar' : 'Collapse sidebar');
                sidenavToggle.setAttribute('title', sidenav.classList.contains('collapsed') ? 'Expand sidebar' : 'Collapse sidebar');
                localStorage.setItem(SIDENAV_COLLAPSED_KEY, sidenav.classList.contains('collapsed') ? '1' : '0');
                updateSidenavWidth();
            });
        }

        // Load saved theme on page load (built-in or dynamic from API)
        function applyDynamicTheme(themeName, themeData) {
            if (!themeData) return;
            try {
                const td = typeof themeData === 'string' ? JSON.parse(themeData) : themeData;
                const v = td.css_vars || {};
                const bg = v['--bg-surface'] || v['--color-bg'] || v['--bg-canvas'] || '#f8f9fa';
                const elevated = v['--bg-elevated'] || v['--surface-2'] || bg;
                const primary = v['--color-primary'] || v['--accent'] || v['--teal'] || '#3b82f6';
                const nav = v['--bg-nav'] || primary;
                const text = v['--text-primary'] || v['--color-text'] || v['--text'] || '#111827';
                const text2 = v['--text-secondary'] || v['--text-muted'] || '#6b7280';
                const border = v['--border'] || v['--color-border'] || '#e5e7eb';
                let el = document.getElementById('theme-dynamic-inject');
                if (!el) {
                    el = document.createElement('style');
                    el.id = 'theme-dynamic-inject';
                    document.head.appendChild(el);
                }
                el.textContent = '[data-theme="' + themeName.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]{--bg-canvas:' + bg + ';--bg-elevated:' + elevated + ';--bg-nav:' + nav + ';--text-primary:' + text + ';--text-secondary:' + text2 + ';--border:' + border + ';--accent:' + primary + ';--accent-hover:' + primary + ';--text-nav:#fff;--text-nav-muted:rgba(255,255,255,0.75);--border-nav:rgba(255,255,255,0.2);}';
            } catch (e) {}
        }
        const savedTheme = localStorage.getItem('dashboard-theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateHeaderLogo();
        }
        fetch('/api/settings/theme', { credentials: 'same-origin' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) {
                if (!d || !d.theme) return;
                var t = String(d.theme).trim();
                document.documentElement.setAttribute('data-theme', t);
                try { localStorage.setItem('dashboard-theme', t); } catch (e) {}
                if (d.variables && Object.keys(d.variables).length) applyDynamicTheme(t, { css_vars: d.variables });
                updateHeaderLogo();
            })
            .catch(function () {});

        // Simple notifications dropdown (UI shell only; data wiring can be added later)
        (function () {
            const btn = document.getElementById('notifications-btn');
            const dropdown = document.getElementById('notifications-dropdown');
            const badge = document.getElementById('notifications-badge');
            const markAll = document.getElementById('notifications-mark-all');
            if (!btn || !dropdown) return;

            let open = false;

            function toggle() {
                open = !open;
                dropdown.style.display = open ? 'block' : 'none';
                if (open) positionHeaderDropdown(btn, dropdown, 'right');
            }

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggle();
            });

            document.addEventListener('click', (e) => {
                if (!open) return;
                if (!dropdown.contains(e.target) && e.target !== btn) {
                    open = false;
                    dropdown.style.display = 'none';
                }
            });

            if (markAll) {
                markAll.addEventListener('click', () => {
                    const list = document.getElementById('notifications-list');
                    if (list) {
                        list.innerHTML = '<div style=\"padding:12px 16px; font-size:13px; color:#9ca3af; text-align:center;\">All caught up</div>';
                    }
                    if (badge) badge.style.display = 'none';
                });
            }

            // Example: show a single unread badge if needed later
            if (badge) {
                badge.textContent = '';
                badge.style.display = 'none';
            }
        })();

        // Search: dropdown on focus, RAG knowledge search (debounced), history from localStorage, mobile magnifier
        (function () {
            const wrap = document.getElementById('searchWrap');
            const input = document.getElementById('searchInput');
            const dropdown = document.getElementById('searchDropdown');
            const mobileBtn = document.getElementById('searchMobileBtn');
            const SEARCH_HISTORY_KEY = 'dashboard-search-history';
            const maxHistory = 10;
            var ragResults = [];
            var ragLoading = false;
            var ragDebounceTimer = null;

            function getHistory() {
                try { return JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]'); } catch { return []; }
            }
            function addToHistory(label, url) {
                const h = getHistory().filter(function (x) { return x.url !== url; });
                h.unshift({ label: label || url, url: url });
                localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(h.slice(0, maxHistory)));
            }
            function insertRagIntoChat(content) {
                var text = 'Context from knowledge base:\n\n' + (content || '').slice(0, 2000) + '\n\nBased on this, ';
                var footerInput = document.getElementById('agent-footer-chat-input');
                var drawerInput = document.getElementById('agentDrawerInput');
                if (footerInput) {
                    footerInput.value = text;
                    footerInput.focus();
                    var pane = document.getElementById('agent-footer-pane');
                    var bar = document.getElementById('agent-footer-chat');
                    if (bar && bar.classList.contains('collapsed')) {
                        var expandBtn = document.getElementById('agent-footer-expand-btn');
                        if (expandBtn) expandBtn.click();
                    }
                } else if (drawerInput) {
                    drawerInput.value = text;
                    drawerInput.focus();
                }
            }
            function fetchRag(query, cb) {
                if (ragLoading || !query || query.length < 3) { cb([]); return; }
                ragLoading = true;
                fetch(window.location.origin + '/api/agent/rag/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ query: query.trim() })
                }).then(function (r) { return r.json(); }).then(function (d) {
                    ragLoading = false;
                    var matches = (d && d.matches) ? d.matches : [];
                    cb(Array.isArray(matches) ? matches : []);
                }).catch(function () { ragLoading = false; cb([]); });
            }
            function renderSuggestions() {
                var q = (input && input.value) ? input.value.trim() : '';
                var showRag = q.length >= 3 && (ragResults.length > 0 || ragLoading);
                const h = getHistory();
                const navItems = ['Overview', 'Finance', 'Billing', 'Clients', 'Calendar', 'Dev Tools', 'MCP', 'Cloud', 'Images', 'Draw', 'Meet', 'Kanban', 'Time Tracking', 'CMS', 'Mail', 'Pipelines', 'User Settings', 'Onboarding', 'Agent'];
                const urls = ['/dashboard/overview', '/dashboard/finance', '/dashboard/billing', '/dashboard/clients', '/dashboard/calendar', '/dashboard/tools', '/dashboard/mcp', '/dashboard/cloud', '/dashboard/images', '/dashboard/draw', '/dashboard/meet', '/dashboard/kanban', '/dashboard/time-tracking', '/dashboard/cms', '/dashboard/mail', '/dashboard/pipelines', '/dashboard/user-settings', '/dashboard/onboarding', '/dashboard/agent', '/dashboard/chats'];
                var html = '';
                if (showRag) {
                    html += '<div class="search-dropdown-header" style="padding:8px 12px; font-size:11px; color: var(--text-secondary); text-transform: uppercase;">Knowledge</div>';
                    if (ragLoading) {
                        html += '<div class="item search-rag-item" style="color: var(--text-secondary);">Searching...</div>';
                    } else {
                        ragResults.slice(0, 8).forEach(function (text) {
                            var raw = typeof text === 'string' ? text : '';
                            var snippet = raw.slice(0, 120);
                            if (raw.length > 120) snippet += '...';
                            var esc = snippet.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            html += '<div class="item search-rag-item" data-rag-content="' + esc + '">' + esc + '</div>';
                        });
                    }
                }
                if (h.length) html += '<div class="search-dropdown-header" style="padding:8px 12px; font-size:11px; color: var(--text-secondary); text-transform: uppercase;">Recent</div>';
                h.forEach(function (x) { html += '<div class="item" data-url="' + (x.url || '') + '">' + (x.label || x.url) + '</div>'; });
                navItems.forEach(function (label, i) { if (!h.some(function (x) { return x.url === urls[i]; })) html += '<div class="item" data-url="' + urls[i] + '">' + label + '</div>'; });
                if (dropdown) dropdown.innerHTML = html || '<div class="item" style="color: var(--text-secondary);">No history yet</div>';
                dropdown.querySelectorAll('.item[data-url]').forEach(function (el) {
                    el.addEventListener('click', function () {
                        const u = el.getAttribute('data-url');
                        if (u) { addToHistory(el.textContent.trim(), u); window.location.href = u; }
                    });
                });
                dropdown.querySelectorAll('.item.search-rag-item[data-rag-content]').forEach(function (el) {
                    el.addEventListener('click', function () {
                        var content = el.getAttribute('data-rag-content');
                        if (content) insertRagIntoChat(content);
                        dropdown.classList.remove('open');
                    });
                });
            }
            if (input) {
                input.addEventListener('focus', function () { dropdown.classList.add('open'); positionHeaderDropdown(wrap, dropdown, 'left'); renderSuggestions(); });
                input.addEventListener('blur', function () { setTimeout(function () { dropdown.classList.remove('open'); }, 150); });
                input.addEventListener('input', function () {
                    var q = input.value.trim();
                    if (ragDebounceTimer) clearTimeout(ragDebounceTimer);
                    if (q.length >= 3) {
                        ragDebounceTimer = setTimeout(function () {
                            fetchRag(q, function (matches) {
                                ragResults = matches;
                                if (dropdown.classList.contains('open')) renderSuggestions();
                            });
                        }, 300);
                    } else {
                        ragResults = [];
                    }
                    if (dropdown.classList.contains('open')) renderSuggestions();
                });
                input.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        const v = input.value.trim();
                        if (v) { addToHistory(v, '/dashboard/overview'); window.location.href = '/dashboard/overview'; }
                    }
                });
            }
            if (mobileBtn) {
                mobileBtn.addEventListener('click', function () {
                    wrap.classList.toggle('expanded');
                    if (wrap.classList.contains('expanded')) { input.focus(); dropdown.classList.add('open'); positionHeaderDropdown(wrap, dropdown, 'left'); renderSuggestions(); }
                });
            }
            renderSuggestions();
        })();

        const sidenavLogout = document.getElementById('sidenavLogoutBtn');
        if (sidenavLogout) {
            sidenavLogout.addEventListener('click', () => {
                fetch('/api/auth/logout', { method: 'POST',
                    credentials: 'same-origin' })
                    .finally(() => {
                        window.location.href = '/auth-signin.html';
                    });
            });
        }
        const searchBtn = document.getElementById('sidenavSearchBtn');
        if (searchBtn) {
            searchBtn.addEventListener('click', () => {
                const topSearch = document.getElementById('searchInput')
                    || document.querySelector('.search-input');
                if (topSearch) topSearch.focus();
            });
        }
    </script>
</body>
</html>
