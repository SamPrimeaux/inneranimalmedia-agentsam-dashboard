<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dark Theme Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #2e2e2e;
      color: #ffffff;
    }
    .container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 30px;
      font-size: 2em;
      text-align: center;
    }
    .kpi-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
    }
    .kpi-card {
      flex: 1;
      min-width: 200px;
      background-color: #3e3e3e;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    .kpi-title {
      font-size: 0.9em;
      color: #bbbbbb;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .kpi-value {
      font-size: 2em;
      font-weight: bold;
      color: #00bcd4;
    }
    .chart-container {
      background-color: #3e3e3e;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    .chart-container canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard</h1>
    <div class="kpi-cards">
      <div class="kpi-card">
        <div class="kpi-title">Total Users</div>
        <div class="kpi-value">1,234</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-title">Revenue</div>
        <div class="kpi-value">$56,789</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-title">New Sign-ups</div>
        <div class="kpi-value">321</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-title">Server Uptime</div>
        <div class="kpi-value">99.9%</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('barChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Placeholder Data',
          data: [12, 19, 3, 5, 2, 3],
          backgroundColor: '#00bcd4'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            ticks: { color: '#ffffff' },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#ffffff' },
            grid: { color: '#555555' }
          }
        },
        plugins: {
          legend: {
            labels: { color: '#ffffff' }
          },
          title: {
            display: true,
            text: 'Placeholder Bar Chart',
            color: '#ffffff',
            font: { size: 16 }
          }
        }
      }
    });
  </script>
</body>
</html>
