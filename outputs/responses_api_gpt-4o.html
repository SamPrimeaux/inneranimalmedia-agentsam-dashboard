<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background-color: #1E1E1E;
            border-radius: 8px;
            padding: 20px;
            margin: 10px;
            text-align: center;
            width: 150px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .cards-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
        }
        .chart-placeholder {
            background-color: #1E1E1E;
            border-radius: 8px;
            width: 600px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .chart-placeholder h2 {
            color: #757575;
        }
    </style>
</head>
<body>

    <div class="cards-container">
        <div class="card">
            <h2>KPI 1</h2>
            <p>Value 1</p>
        </div>
        <div class="card">
            <h2>KPI 2</h2>
            <p>Value 2</p>
        </div>
        <div class="card">
            <h2>KPI 3</h2>
            <p>Value 3</p>
        </div>
        <div class="card">
            <h2>KPI 4</h2>
            <p>Value 4</p>
        </div>
    </div>

    <div class="chart-placeholder">
        <h2>Bar Chart Placeholder</h2>
    </div>

</body>
</html>
