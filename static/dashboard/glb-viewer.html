<!DOCTYPE html>
<html lang="en" data-theme="meaux-glass-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CRITICAL: Theme must load BEFORE any visible content -->
  <script>
  (function() {
      const saved = localStorage.getItem('dashboard-theme');
      if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
      }
      const savedVars = localStorage.getItem('dashboard-theme-vars');
      if (savedVars) {
          const style = document.createElement('style');
          style.id = 'theme-preload-inject';
          style.textContent = savedVars;
          document.head.appendChild(style);
      }
  })();
  </script>
  <title>3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    #canvas { display: block; width: 100%; height: 100%; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #0d1117; color: #6e7681; font: 14px/1.5 system-ui, sans-serif; }
    #error { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; color: #f85149; font: 14px/1.5 system-ui, sans-serif; text-align: center; padding: 24px; }
    #error.visible { display: flex; }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading 3D model…</div>
  <div id="error">Missing <code>url</code> parameter, or model failed to load.</div>
  <canvas id="canvas"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const url = params.get('url');
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const canvas = document.getElementById('canvas');

      if (!url || !url.trim()) {
        loadingEl.classList.add('hidden');
        errorEl.classList.add('visible');
        errorEl.innerHTML = 'Missing <code>url</code> parameter. Use ?url=...';
        return;
      }

      if (typeof THREE === 'undefined' || !THREE.GLTFLoader || !THREE.OrbitControls) {
        loadingEl.classList.add('hidden');
        errorEl.classList.add('visible');
        errorEl.textContent = 'Three.js or loaders failed to load.';
        return;
      }

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1117);
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
      const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: canvas });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(5, 10, 7);
      scene.add(dir);
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 1.2;

      const loader = new THREE.GLTFLoader();
      loader.load(
        url,
        function(gltf) {
          const box = new THREE.Box3().setFromObject(gltf.scene);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          gltf.scene.position.sub(center);
          scene.add(gltf.scene);
          const maxDim = Math.max(size.x, size.y, size.z);
          camera.position.set(maxDim * 0.8, maxDim * 0.6, maxDim * 0.8);
          camera.lookAt(0, 0, 0);
          controls.update();
          loadingEl.classList.add('hidden');
        },
        undefined,
        function() {
          loadingEl.classList.add('hidden');
          errorEl.classList.add('visible');
          errorEl.textContent = 'Model failed to load. Check the URL and CORS.';
        }
      );

      window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function loop() {
        requestAnimationFrame(loop);
        controls.update();
        renderer.render(scene, camera);
      }
      loop();
    })();
  </script>
</body>
</html>
