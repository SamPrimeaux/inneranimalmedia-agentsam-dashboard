  var origRem = EventTarget.prototype.removeEventListener;
  var map = new WeakMap();
  EventTarget.prototype.addEventListener = function (type, fn, opts) {
    if (type === 'unload' && this === window) {
      var wrapped = function (e) { if (!e.persisted) fn.call(window, e); };
      if (!map.has(fn)) map.set(fn, wrapped);
      return origAdd.call(this, 'pagehide', wrapped, opts);
    }
    return origAdd.apply(this, arguments);
  };
  EventTarget.prototype.removeEventListener = function (type, fn, opts) {
    if (type === 'unload' && this === window) {
      var wrapped = map.get(fn);

    }
    return origRem.apply(this, arguments);
  };
})();

<!-- =========================================================
     STORAGE HELPERS
     getStoredScene / setStoredScene on window so Excalidraw
     module script can call them (separate script tag = same
     window scope, no module isolation issues).
     ========================================================= -->
<script nonce="MTM2MzQ4Nzk5MSwxMDgxNzAzOTI4">
(function () {
  var IDB_NAME  = 'draw-storage';
  var IDB_STORE = 'scenes';
  var LS_KEY    = 'dashboard-draw-scene';


  function getBackend() {
    var el = document.getElementById('storageBackend');
    return el ? el.value : 'local';
  }
  function getProjectId() {
    return localStorage.getItem('currentProject') || 'default';
  }
  function openIDB() {
    return new Promise(function (res, rej) {
      try {
        var r = indexedDB.open(IDB_NAME, 1);
        r.onerror = rej;
        r.onsuccess = function () { res(r.result); };
        r.onupgradeneeded = function () {
          r.result.createObjectStore(IDB_STORE, { keyPath: 'projectId' });
        };
      } catch (e) { rej(e); }
    });
  }


  window.getStoredScene = function () {
    var projectId = getProjectId();
    return openIDB().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx  = db.transaction(IDB_STORE, 'readonly');
        var req = tx.objectStore(IDB_STORE).get(projectId);
        req.onsuccess = function () {
          var row = req.result;
          if (row && row.scene && row.scene.elements && row.scene.appState) {
            if (!Array.isArray(row.scene.appState.collaborators))
              row.scene.appState.collaborators = [];
            resolve(row.scene);
          } else {
            // IDB miss — try localStorage fallback
            try {
              var raw = localStorage.getItem(LS_KEY);
              if (raw) {
                var d = JSON.parse(raw);
                if (d.elements && d.appState) {
                  if (!Array.isArray(d.appState.collaborators))
                    d.appState.collaborators = [];
                  resolve(d); return;
                }
              }
            } catch (_) {}
            resolve(null);
          }
        };
        req.onerror = reject;
      });
    }).catch(function () {
      // IDB unavailable — localStorage only
      try {
        var raw = localStorage.getItem(LS_KEY);
        if (raw) {
          var d = JSON.parse(raw);
          if (d.elements && d.appState) {
            if (!Array.isArray(d.appState.collaborators))
              d.appState.collaborators = [];
            return d;
          }
        }
      } catch (_) {}
      return null;
    });
  };


  window.setStoredScene = function (data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (_) {}
    var projectId = getProjectId();
    openIDB().then(function (db) {
      var tx  = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put({ projectId: projectId, scene: data, updatedAt: Date.now() });
    }).catch(function () {});
    if (getBackend() !== 'local' && typeof window.drawExportAndSaveToRemote === 'function') {
      window.drawExportAndSaveToRemote();
    }
  };


  window.getCurrentProjectId = getProjectId;


  // Save status toast helper
  window.showSaveStatus = function (ok) {
    var el = document.getElementById('draw-save-status');
    if (!el) return;
    el.textContent = ok ? 'Saved' : 'Save failed';
    el.className = 'visible ' + (ok ? 'ok' : 'err');
    clearTimeout(el._t);
    el._t = setTimeout(function () { el.className = ''; }, 2200);
  };


  // Remote export helper
  var exportTimer;
  window.drawExportAndSaveToRemote = function () {
    clearTimeout(exportTimer);
    exportTimer = setTimeout(function () {
      var api = window.__excalidrawApi;
      if (!api || typeof api.exportToBlob !== 'function') return;
      api.exportToBlob().then(function (blob) {
        var reader = new FileReader();
        reader.onloadend = function () {
          var backend = getBackend();
          var url = '/api/draw/save';
          if (backend === 'google-drive') url = '/api/draw/save-google';
          else if (backend === 'github')  url = '/api/draw/save-github';
          fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              projectId: getProjectId(),
              canvasData: reader.result,
              timestamp: Date.now()
            }),
            credentials: 'include'
          }).then(function (r) { window.showSaveStatus(r.ok); });
        };
        reader.readAsDataURL(blob);
      }).catch(function () {});
    }, 1500);
  };


  // Persist storage backend choice
  var sel = document.getElementById('storageBackend');
  if (sel) {
    var saved = localStorage.getItem('drawStorageBackend');
    if (saved) sel.value = saved;
    sel.addEventListener('change', function () {
      localStorage.setItem('drawStorageBackend', sel.value);
    });
  }
})();
</script>

    var parseLibraryTokensFromUrl = ExcalidrawMod.parseLibraryTokensFromUrl;

    if (!mountEl) { showError('#excalidraw-canvas-root not found in DOM.'); return; }

      }

      var hint = document.getElementById('drawLibraryHint');

        if (libraryItems.length) {
          setTimeout(function () {

              libraryItems: libraryItems,
              openLibraryMenu: false,
              defaultStatus: 'published'
            }).catch(function () {});
          }, 400);
        }


        // Handle #-based library install URLs (excalidraw.com share links)
        if (location.hash && parseLibraryTokensFromUrl) {
          try {
            var tokens = parseLibraryTokensFromUrl();
            if (tokens && tokens.libraryUrl) {

                .then(function (r) { return r.ok ? r.blob() : null; })
                .then(function (blob) {
                  if (!blob) return;
                  return loadLibraryFromBlob(blob, 'published').then(function (data) {
                    var items = data.libraryItems || [];
                    if (items.length) {
                      api.updateLibrary({ libraryItems: items, merge: true, openLibraryMenu: true });
                    }
                    location.hash = '';
                  });
                })
                .catch(function () { location.hash = ''; });
            }
          } catch (_) {}
        }
      }


      var root = createRoot(mountEl);
      root.render(
        React.createElement(Excalidraw, {
          excalidrawAPI: onApiReady,
          initialData: initialData,
          onChange: function (elements, appState) {
            if (typeof window.setStoredScene === 'function') {
              window.setStoredScene({ elements: elements, appState: appState });
            }
          }
        })
      );


    }).catch(function (err) {
      console.error('[Draw] Init error:', err);
      showError((err && err.message) ? err.message : 'Init failed. Check console.');
    });


  }).catch(function (err) {
    clearTimeout(watchdog);
    console.error('[Draw] Module load error:', err);
    showError('Failed to load Excalidraw from CDN. '
      + ((err && err.message) ? err.message : '')
      + ' — check network/CSP and try refreshing.');
  });
})();
