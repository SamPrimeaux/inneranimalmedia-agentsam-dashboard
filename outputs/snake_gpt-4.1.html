<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberpunk Snake Game</title>
  <meta name="viewport" content="width=480">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(ellipse at center, #0f2027 0%, #2c5364 100%);
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Orbitron', 'Montserrat', 'Arial', sans-serif;
      user-select: none;
    }
    h1 {
      color: #00ffe7;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00ffe7, 0 0 16px #ff00cc;
      margin-bottom: 16px;
      font-size: 2.4em;
      font-weight: 900;
    }
    #score {
      color: #fff;
      font-size: 1.3em;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-shadow: 0 0 8px #00ffe7, 0 0 4px #ff00cc;
      font-weight: bold;
      background: rgba(30,0,50,0.18);
      border-radius: 8px;
      padding: 4px 18px;
      border: 2px solid #1fffc3;
      box-shadow: 0 0 12px #1fffc3, 0 0 2px #ff00cc;
      display: inline-block;
    }
    #game-container {
      position: relative;
      box-shadow: 0 0 32px #00ffe7, 0 0 48px #ff00cc;
      border: 4px solid #ff00cc;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(30,0,50,0.95) 60%, rgba(0,255,231,0.15) 100%);
      overflow: hidden;
    }
    canvas {
      display: block;
      background: transparent;
      border-radius: 12px;
    }
    #game-over {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      z-index: 10;
      color: #fff;
      text-align: center;
      font-size: 2em;
      text-shadow: 0 0 18px #ff00cc, 0 0 5px #00ffe7;
      letter-spacing: 2px;
      border-radius: 12px;
      animation: fadeIn 0.5s;
    }
    #game-over button {
      margin-top: 24px;
      padding: 11px 38px;
      font-size: 1.1em;
      font-family: inherit;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, #ff00cc 0%, #00ffe7 100%);
      border: none;
      border-radius: 8px;
      box-shadow: 0 0 12px #00ffe7, 0 0 8px #ff00cc;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #game-over button:hover {
      background: linear-gradient(90deg, #00ffe7 0%, #ff00cc 100%);
      box-shadow: 0 0 24px #ff00cc, 0 0 16px #00ffe7;
    }
    @keyframes fadeIn {
      from { opacity: 0;}
      to { opacity: 1;}
    }
    /* Cyberpunk flicker effect for Game Over */
    #game-over .flicker {
      animation: flicker 1.8s infinite alternate;
    }
    @keyframes flicker {
      0% { opacity: 1; }
      20% { opacity: 0.85; }
      22% { opacity: 1; }
      24% { opacity: 0.7; }
      30% { opacity: 1; }
      35% { opacity: 0.95; }
      38% { opacity: 0.85; }
      40% { opacity: 1; }
      100% { opacity: 1; }
    }
  </style>
  <!-- Orbitron font for cyberpunk feel -->
  <link href="https://fonts.googleapis.com/css?family=Orbitron:900" rel="stylesheet">
</head>
<body>
  <h1>CYBER SNAKE</h1>
  <div id="score">SCORE: 0</div>
  <div id="game-container" style="width:480px;height:480px;">
    <canvas id="game" width="480" height="480"></canvas>
    <div id="game-over" style="display:none;">
      <div class="flicker" style="font-size:2.1em;margin-bottom:16px;">GAME OVER</div>
      <div id="final-score" style="font-size:1.2em;margin-bottom:8px;"></div>
      <button id="restart-btn">RESTART</button>
    </div>
  </div>
  <script>
    // --- Game Config ---
    const gridSize = 24; // Number of cells per row/col
    const cellSize = 20; // px
    const canvasSize = gridSize * cellSize;
    const moveInterval = 70; // ms per move (lower=faster)
    const colors = {
      bg: "#0f2027",
      grid: "rgba(0,255,231,0.07)",
      snakeHead: "#ff00cc",
      snakeBody: "#00ffe7",
      snakeGlow: "#ff00cc",
      food: "#00ffe7",
      foodGlow: "#ff00cc"
    };

    // --- Game State ---
    let snake, direction, nextDirection, food, score, gameOver, moveTimer;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreDiv = document.getElementById('score');
    const gameOverDiv = document.getElementById('game-over');
    const finalScoreDiv = document.getElementById('final-score');
    const restartBtn = document.getElementById('restart-btn');

    // --- Initialize ---
    function resetGame() {
      snake = [
        {x: 12, y: 12},
        {x: 11, y: 12},
        {x: 10, y: 12}
      ];
      direction = {x: 1, y: 0};
      nextDirection = {x: 1, y: 0};
      score = 0;
      gameOver = false;
      spawnFood();
      updateScore();
      gameOverDiv.style.display = "none";
    }

    function spawnFood() {
      let valid = false;
      while (!valid) {
        food = {
          x: Math.floor(Math.random() * gridSize),
          y: Math.floor(Math.random() * gridSize)
        };
        valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
      }
    }

    function updateScore() {
      scoreDiv.textContent = "SCORE: " + score;
    }

    // --- Input ---
    document.addEventListener('keydown', e => {
      if (gameOver) return;
      let key = e.key.toLowerCase();
      let dir = null;
      if (key === "arrowup" || key === "w") dir = {x:0, y:-1};
      else if (key === "arrowdown" || key === "s") dir = {x:0, y:1};
      else if (key === "arrowleft" || key === "a") dir = {x:-1, y:0};
      else if (key === "arrowright" || key === "d") dir = {x:1, y:0};
      if (dir) {
        // Prevent reverse direction
        if (snake.length > 1 && dir.x === -direction.x && dir.y === -direction.y) return;
        nextDirection = dir;
        e.preventDefault();
      }
    });

    // --- Game Loop ---
    function gameTick() {
      if (gameOver) return;
      // Move snake
      direction = nextDirection;
      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

      // Collision: Wall
      if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
        endGame();
        return;
      }
      // Collision: Self
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        endGame();
        return;
      }

      // Move
      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score += 1;
        updateScore();
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    // --- Draw ---
    function draw() {
      ctx.clearRect(0,0,canvasSize,canvasSize);

      // BG
      ctx.save();
      ctx.fillStyle = "rgba(10,20,40,0.90)";
      ctx.fillRect(0,0,canvasSize,canvasSize);
      ctx.restore();

      // Grid lines (neon)
      ctx.save();
      ctx.strokeStyle = colors.grid;
      ctx.lineWidth = 1;
      for (let i=1; i<gridSize; i++) {
        ctx.beginPath();
        ctx.moveTo(i*cellSize,0);
        ctx.lineTo(i*cellSize,canvasSize);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0,i*cellSize);
        ctx.lineTo(canvasSize,i*cellSize);
        ctx.stroke();
      }
      ctx.restore();

      // Food (glow)
      drawNeonCell(food.x, food.y, colors.food, colors.foodGlow, 1.2, 8);

      // Snake
      for (let i=snake.length-1; i>=0; i--) {
        let seg = snake[i];
        if (i === 0) {
          // Head
          drawNeonCell(seg.x, seg.y, colors.snakeHead, colors.snakeGlow, 1.5, 12, true);
        } else {
          // Body
          drawNeonCell(seg.x, seg.y, colors.snakeBody, colors.snakeGlow, 1.1, 6);
        }
      }
    }

    // Draw a neon glowing square cell
    function drawNeonCell(x, y, color, glow, scale=1, blur=8, isHead=false) {
      const px = x * cellSize + cellSize/2;
      const py = y * cellSize + cellSize/2;
      const size = cellSize * scale * 0.85;
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = blur;
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = isHead ? 4 : 3;
      ctx.rect(px-size/2, py-size/2, size, size);
      ctx.stroke();
      ctx.fillStyle = color + "cc";
      ctx.globalAlpha = 0.7;
      ctx.fillRect(px-size/2, py-size/2, size, size);
      ctx.restore();
      // Add "scanline" effect on head
      if (isHead) {
        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = "#fff";
        for (let i=0; i<4; i++) {
          ctx.beginPath();
          ctx.moveTo(px-size/2, py-size/2 + (i+1)*size/5);
          ctx.lineTo(px+size/2, py-size/2 + (i+1)*size/5);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // --- Game Over ---
    function endGame() {
      gameOver = true;
      gameOverDiv.style.display = "flex";
      finalScoreDiv.innerHTML = "FINAL SCORE: <span style='color:#00ffe7;text-shadow:0 0 8px #ff00cc'>" + score + "</span>";
    }

    restartBtn.onclick = function() {
      resetGame();
    };

    // --- Main Loop ---
    function mainLoop() {
      if (!gameOver) gameTick();
      requestAnimationFrame(mainLoop);
    }

    // --- Start ---
    resetGame();
    draw();
    setInterval(gameTick, moveInterval);
    mainLoop();

    // --- Touch Controls (optional) ---
    // For mobile, could implement on-screen buttons if desired.
  </script>
</body>
</html>
