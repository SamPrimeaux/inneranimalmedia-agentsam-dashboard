<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM Docs — Inner Animal Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* These inherit from the parent dashboard theme
         when embedded, or fall back to Kimbie Dark
         defaults when served standalone */
      --bg: var(--bg-canvas, var(--bg-primary, #1a1712));
      --bg-surface: var(--bg-nav, #201d18);
      --bg-elevated: var(--bg-elevated, #2a2620);
      --bg-hover: var(--bg-hover, #312c25);
      --border: var(--border, #3a342a);
      --border-subtle: var(--border-nav, #2a2620);
      --amber: var(--accent, var(--color-primary, #d4a847));
      --amber-dim: var(--accent-dim, #9a7830);
      --amber-glow: var(--accent-glow, rgba(212,168,71,0.12));
      --text: var(--text-primary, #e8dcc8);
      --text-dim: var(--text-secondary, #9a8c78);
      --text-faint: var(--text-muted, #5a5040);
      --font-mono: var(--font-mono, 'Geist Mono', monospace);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: flex;
      min-height: 100vh;
      max-width: 100vw;
    }

    .sidebar {
      width: 260px;
      min-width: 260px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 150ms cubic-bezier(0.4,0,0.2,1),
                  min-width 150ms cubic-bezier(0.4,0,0.2,1);
    }

    .sidebar-collapse-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-faint);
      cursor: pointer;
      transition: color 150ms, background 150ms;
      font-family: var(--font-mono);
      font-size: 10px;
      gap: 6px;
      letter-spacing: 0.05em;
    }
    .sidebar-collapse-btn:hover {
      color: var(--amber);
      background: var(--amber-glow);
    }
    .sidebar-collapse-btn span {
      font-size: 10px;
      color: inherit;
    }
    .layout.sidebar-collapsed .sidebar {
      width: 40px;
      min-width: 40px;
    }
    .layout.sidebar-collapsed .sidebar-item span,
    .layout.sidebar-collapsed .sidebar-section-label,
    .layout.sidebar-collapsed .sidebar-group > *:not(.sidebar-collapse-btn) {
      display: none;
    }
    .layout.sidebar-collapsed .sidebar-collapse-btn span {
      display: none;
    }
    .layout.sidebar-collapsed .sidebar-item {
      justify-content: center;
      padding: 8px;
    }
    .layout.sidebar-collapsed .sidebar-item-icon {
      margin: 0;
    }

    .sidebar-inner {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 24px;
    }

    .sidebar-section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      padding: 8px 16px 6px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      border-left: 2px solid transparent;
      transition: background 150ms, color 150ms, border-color 150ms;
    }
    .sidebar-item:hover {
      background: var(--bg-hover);
      color: var(--text);
    }
    .sidebar-item[aria-current="page"] {
      border-left-color: var(--amber);
      color: var(--text);
      background: var(--amber-glow);
    }
    .sidebar-item-icon {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      width: 1.25rem;
      text-align: center;
      color: var(--amber-dim);
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }
    .search-wrap {
      position: relative;
      flex: 0 1 320px;
    }
    .search-wrap input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .search-wrap input::placeholder {
      color: var(--text-faint);
    }
    .search-wrap input:focus {
      border-color: var(--amber);
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-faint);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .content {
      flex: 1;
      padding: 28px 32px 48px;
      max-width: 56rem;
    }
    .content h2 {
      font-size: 1.125rem;
      margin: 1.5rem 0 0.75rem;
      color: var(--text);
    }
    .content p, .content li {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 0.65rem;
    }
    .content ul { padding-left: 1.25rem; margin: 0.5rem 0 1rem; }
    .content a {
      color: var(--amber);
      text-decoration: none;
    }
    .content a:hover { text-decoration: underline; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 1rem 0;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .content th {
      background: var(--bg-elevated);
      color: var(--text);
      font-weight: 600;
    }
    .kbd-hint {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
      margin-left: auto;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin: 1.25rem 0 1.75rem;
    }
    .home-card {
      display: block;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-elevated);
      text-decoration: none;
      color: inherit;
      transition: border-color 150ms, background 150ms;
    }
    .home-card:hover {
      border-color: var(--amber);
      background: var(--amber-glow);
    }
    .home-card-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .home-card-icon {
      font-size: 1.35rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .home-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .home-card-desc {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .home-card-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
    }
    .md-body {
      margin-top: 0.5rem;
    }
    .md-body h2 {
      margin-top: 1.75rem;
    }
  </style>
</head>
<body>
  <div class="layout" id="layoutRoot">
    <aside class="sidebar" aria-label="Documentation navigation">
      <button type="button" class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="Toggle sidebar" aria-expanded="true">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14" aria-hidden="true">
          <rect x="1" y="1" width="14" height="14" rx="2"/>
          <path d="M5 1v14"/>
        </svg>
      </button>
      <div class="sidebar-inner">
        <div class="sidebar-group">
          <div class="sidebar-section-label">Library</div>
          <a class="sidebar-item" href="/README.md" data-search="readme overview home"><span class="sidebar-item-icon">H</span><span>Overview</span></a>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-section-label">Guides</div>
          <a class="sidebar-item" href="/cursor/IAM-CURSOR-CONTEXT.md" data-search="cursor ide"><span class="sidebar-item-icon">C</span><span>Cursor context</span></a>
          <a class="sidebar-item" href="/platform/deploy-runbook.md" data-search="deploy runbook"><span class="sidebar-item-icon">D</span><span>Deploy runbook</span></a>
          <a class="sidebar-item" href="/platform/worker-routing.md" data-search="worker routing"><span class="sidebar-item-icon">R</span><span>Worker routing</span></a>
          <a class="sidebar-item" href="/platform/r2-bucket-map.md" data-search="r2 bucket"><span class="sidebar-item-icon">S</span><span>R2 bucket map</span></a>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-section-label">Agents</div>
          <a class="sidebar-item" href="/agents/README.md" data-search="ai providers"><span class="sidebar-item-icon">A</span><span>AI providers</span></a>
          <a class="sidebar-item" href="/agents/tool-reference.md" data-search="tools mcp"><span class="sidebar-item-icon">T</span><span>Tool reference</span></a>
        </div>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <h1>IAM Docs</h1>
        <span class="kbd-hint">Search</span>
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">/</span>
          <input type="search" id="searchInput" placeholder="Filter navigation" autocomplete="off" aria-label="Filter sidebar links">
        </div>
      </header>
      <main class="content" id="homeContent"></main>
    </div>
  </div>

  <script>
    const BASE = 'https://docs.inneranimalmedia.com';

    const STRUCTURE = {
      toolCount: 73,
      categoryCount: 18,
      toolCategories: [
        'ai_3d_generation', 'browser', 'browser_control', 'browser_debug',
        'browser_emulation', 'browser_navigation', 'browser_network', 'browser_performance',
        'context', 'database', 'execute', 'file_conversion', 'image',
        'integrations', 'ops', 'platform', 'quality', 'query', 'storage', 'telemetry', 'terminal'
      ]
    };

    const HOME_CARDS = [
      {
        icon: '\u2325',
        title: 'Cursor Context',
        desc: 'Full platform context doc for Cursor IDE',
        path: 'cursor/IAM-CURSOR-CONTEXT.md',
        count: '1 doc'
      },
      {
        icon: '\u2726',
        title: 'AI Agents',
        desc: 'Anthropic ($565), OpenAI ($87), Gemini ($55), Workers AI — real cost data',
        path: 'agents/README.md',
        count: '7 docs'
      },
      {
        icon: '\u26A1',
        title: 'Platform',
        desc: 'Deploy runbooks, worker routing, R2 map, D1 schema, bindings',
        path: 'platform/deploy-runbook.md',
        count: '5 docs'
      },
      {
        icon: '\u2699',
        title: 'Tool Reference',
        desc: '73 tools across 18 categories — CDT, terminal, R2, D1, image, 3D, MCP',
        path: 'agents/tool-reference.md',
        count: '73 tools'
      },
      {
        icon: '\u22C8',
        title: 'AutoRAG',
        desc: 'RAG pipeline, iam-autorag index, knowledge base architecture',
        path: 'autorag/architecture/how-rag-works.md',
        count: '1 doc'
      },
      {
        icon: '\u25D0',
        title: 'Clients',
        desc: 'Per-client documentation and build overviews',
        path: 'clients/README.md',
        count: '3 docs'
      }
    ];

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderHome() {
      const root = document.getElementById('homeContent');
      if (!root) return;

      const cardsHtml = HOME_CARDS.map(function (c) {
        const href = '/' + c.path;
        return (
          '<a class="home-card" href="' + esc(href) + '">' +
          '<div class="home-card-head">' +
          '<span class="home-card-icon" aria-hidden="true">' + esc(c.icon) + '</span>' +
          '<div><div class="home-card-title">' + esc(c.title) + '</div></div>' +
          '</div>' +
          '<p class="home-card-desc">' + esc(c.desc) + '</p>' +
          '<div class="home-card-meta">' + esc(c.count) + '</div>' +
          '</a>'
        );
      }).join('');

      const catNote = STRUCTURE.toolCount + ' tools across ' + STRUCTURE.categoryCount + ' category groupings (' +
        STRUCTURE.toolCategories.length + ' distinct tool_category values in D1).';

      root.innerHTML =
        '<p>Public documentation for the Inner Animal Media platform. Files are served from the <strong>iam-docs</strong> R2 bucket at <a id="baseLink" href="' + esc(BASE) + '">docs.inneranimalmedia.com</a>.</p>' +
        '<p style="font-size:13px;color:var(--text-faint)">' + esc(catNote) + '</p>' +
        '<div class="cards-grid">' + cardsHtml + '</div>' +
        '<div class="md-body">' +
        '<h2>System Reality</h2>' +
        '<table>' +
        '<thead><tr><th>Provider</th><th>Top Model</th><th>Calls</th><th>Spend</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>Anthropic</td><td>claude-haiku-4-5-20251001</td><td>338</td><td>$2.50</td></tr>' +
        '<tr><td>Anthropic</td><td>claude-sonnet-4-6</td><td>113</td><td>$4.58</td></tr>' +
        '<tr><td>Google</td><td>gemini-2.5-flash</td><td>104</td><td>$0.009</td></tr>' +
        '<tr><td>OpenAI</td><td>gpt-4.1</td><td>8</td><td>$0.11</td></tr>' +
        '<tr><td>Workers AI</td><td>llama-3.1-8b-instruct</td><td>5</td><td>$0.00007</td></tr>' +
        '<tr><td>Cursor IDE</td><td>claude-auto / opus</td><td>670+</td><td>$450+</td></tr>' +
        '</tbody></table>' +
        '<p>Sprint: <strong>44/77 steps complete (57%)</strong> &mdash; Worker <code>924e4b04</code> &mdash; v136 &mdash; 2026-03-23</p>' +
        '</div>' +
        '<h2>Directories</h2>' +
        '<table><thead><tr><th>Path</th><th>Contents</th></tr></thead><tbody>' +
        '<tr><td><code>cursor/</code></td><td>Cursor IDE context docs</td></tr>' +
        '<tr><td><code>agents/</code></td><td>AI provider references and tool docs</td></tr>' +
        '<tr><td><code>autorag/</code></td><td>AutoRAG knowledge base source files</td></tr>' +
        '<tr><td><code>platform/</code></td><td>Deploy runbooks, routing, bindings, schema</td></tr>' +
        '<tr><td><code>clients/</code></td><td>Per-client documentation</td></tr>' +
        '<tr><td><code>sessions/</code></td><td>Session logs and summaries</td></tr>' +
        '<tr><td><code>screenshots/</code></td><td>Agent and test screenshots</td></tr>' +
        '<tr><td><code>archive/</code></td><td>Long-term storage</td></tr>' +
        '</tbody></table>' +
        '<h2>Quick links</h2><ul>' +
        '<li><a href="/cursor/IAM-CURSOR-CONTEXT.md">Cursor context</a></li>' +
        '<li><a href="/platform/deploy-runbook.md">Deploy runbook</a></li>' +
        '<li><a href="/agents/README.md">All AI providers</a></li>' +
        '<li><a href="/agents/tool-reference.md">Tool reference</a></li>' +
        '<li><a href="/platform/worker-routing.md">Worker routing</a></li>' +
        '<li><a href="/platform/r2-bucket-map.md">R2 bucket map</a></li>' +
        '</ul>';
    }

    renderHome();

    function initSearch() {
      const input = document.getElementById('searchInput');
      if (!input) return;
      input.addEventListener('input', function () {
        const q = input.value.trim().toLowerCase();
        document.querySelectorAll('.sidebar-item').forEach(function (el) {
          const hay = (el.getAttribute('data-search') || el.textContent || '').toLowerCase();
          el.style.display = !q || hay.includes(q) ? '' : 'none';
        });
        document.querySelectorAll('.sidebar-group').forEach(function (group) {
          const items = group.querySelectorAll('.sidebar-item');
          let any = false;
          items.forEach(function (it) {
            if (it.style.display !== 'none') any = true;
          });
          const label = group.querySelector('.sidebar-section-label');
          if (label) label.style.display = any ? '' : 'none';
        });
      });
    }

    function updateCollapseBtn() {
      const layout = document.querySelector('.layout');
      const btn = document.getElementById('sidebarCollapseBtn');
      if (!layout || !btn) return;
      const collapsed = layout.classList.contains('sidebar-collapsed');
      btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
      btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    }

    function initSidebarCollapse() {
      const btn = document.getElementById('sidebarCollapseBtn');
      const layout = document.querySelector('.layout');
      const COLLAPSE_KEY = 'iam_docs_sidebar_collapsed';

      if (!btn || !layout) return;

      if (localStorage.getItem(COLLAPSE_KEY) === '1') {
        layout.classList.add('sidebar-collapsed');
      }

      btn.addEventListener('click', function () {
        layout.classList.toggle('sidebar-collapsed');
        const collapsed = layout.classList.contains('sidebar-collapsed');
        localStorage.setItem(COLLAPSE_KEY, collapsed ? '1' : '0');
        updateCollapseBtn();
      });

      updateCollapseBtn();
    }

    initSearch();
    initSidebarCollapse();

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
        e.preventDefault();
        const b = document.getElementById('sidebarCollapseBtn');
        if (b) b.click();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        const s = document.getElementById('searchInput');
        if (s) s.focus();
      }
    });
  </script>
</body>
</html>
